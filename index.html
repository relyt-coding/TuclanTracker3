                // ###price — desc  →  price card with purchase button
                if (para.startsWith("###")) {
                  const lines = para.split("\n").filter(l => l.startsWith("###"));
                  return (
                    <div key={i} style={{ display:"flex", flexDirection:"column", gap:8, margin:"8px 0" }}>
                      {lines.map((line, j) => {
                        const text = line.replace("###", "").trim();
                        const dashIdx = text.indexOf("—");
                        const price = dashIdx > -1 ? text.slice(0, dashIdx).trim() : text;
                        const desc = dashIdx > -1 ? text.slice(dashIdx + 1).trim() : "";
                        return (
                          <div key={j} style={{ display:"flex", alignItems:"center", gap:14, padding:"12px 16px", background:info.color+"11", border:"1px solid "+info.color+"44", borderRadius:4, borderLeft:"3px solid "+info.color }}>
                            <span style={{ fontFamily:"Bebas Neue, sans-serif", fontSize:22, color:info.color, letterSpacing:1, flexShrink:0 }}>{price}</span>
                            {desc && <span style={{ fontFamily:"Barlow, sans-serif", fontSize:15, color:"#c8e6c8", flex:1 }}>— {desc}</span>}
                            <a href="https://streamlabs.com/attackingtucans/tip" target="_blank" rel="noreferrer"
                              style={{ flexShrink:0, padding:"6px 14px", borderRadius:3, background:info.color+"22", border:"1px solid "+info.color+"66", color:info.color, fontFamily:"Bebas Neue, sans-serif", fontSize:13, letterSpacing:2, textDecoration:"none" }}>
                              {"💳 PURCHASE"}
                            </a>
                          </div>
                        );
                      })}
                    </div>
                  );
                }
                // Block containing ===Header=== lines mixed with body text
                if (para.includes("===")) {
                  return (
                    <div key={i} style={{ margin:"12px 0" }}>
                      {para.split("\n").map((line, j) => {
                        if (line.startsWith("===") && line.endsWith("===")) {
                          const heading = line.slice(3,-3).trim();
                          const [label, ...rest] = heading.split("—");
                          return (
                            <div key={j} style={{ padding:"8px 14px", background:info.color+"18", border:"1px solid "+info.color+"44", borderRadius:4, borderLeft:"3px solid "+info.color, marginBottom:8, marginTop: j>0 ? 12 : 0 }}>
                              <span style={{ fontFamily:"Bebas Neue, sans-serif", fontSize:16, color:info.color, letterSpacing:2 }}>{label.trim()}</span>
                              {rest.length > 0 && <span style={{ fontFamily:"Barlow, sans-serif", fontSize:14, color:"#8fbb8f", marginLeft:8 }}>— {rest.join("—").trim()}</span>}
                            </div>
                          );
                        }
                        return line.trim() ? <p key={j} style={{ fontFamily:"Barlow, sans-serif", fontSize:15, color:"#c8e6c8", lineHeight:1.8, marginBottom:6, paddingLeft:4 }}>{line}</p> : null;
                      })}
                    </div>
                  );
                }
                return (
                  <p key={i} style={{ fontFamily:"Barlow, sans-serif", fontSize:16, color:"#c8e6c8", lineHeight:1.85, marginBottom: i < info.body.split("\n\n").length - 1 ? 16 : 0 }}>
                    {para}
                  </p>
                );
              })}
              {(tierName === "GAME" || tierName === "WHEEL") && onViewLibrary ? (
                <div style={{ marginTop:24, display:"flex", gap:10 }}>
                  <button onClick={onViewLibrary}
                    style={{ flex:1, padding:"12px 0", borderRadius:4, background:"none", border:"1px solid " + info.color + "44", color:info.color+"aa", fontFamily:"Bebas Neue, sans-serif", fontSize:15, letterSpacing:2, cursor:"pointer" }}>
                    {"📋 GAME LIBRARY"}
                  </button>
                  <a href="https://streamlabs.com/attackingtucans/tip" target="_blank" rel="noreferrer"
                    style={{ flex:1, padding:"12px 0", borderRadius:4, background:"linear-gradient(135deg," + info.color + "33," + info.color + "11)", border:"1px solid " + info.color + "66", color:info.color, fontFamily:"Bebas Neue, sans-serif", fontSize:15, letterSpacing:2, textDecoration:"none", display:"flex", alignItems:"center", justifyContent:"center", boxShadow:"0 0 20px " + info.color + "22" }}>
                    {"💳 PURCHASE"}
                  </a>
                </div>
              ) : (
                <a href="https://streamlabs.com/attackingtucans/tip" target="_blank" rel="noreferrer"
                  style={{ marginTop:24, display:"flex", alignItems:"center", justifyContent:"center", gap:10, padding:"12px 0", borderRadius:4, background:"linear-gradient(135deg," + info.color + "33," + info.color + "11)", border:"1px solid " + info.color + "66", color:info.color, fontFamily:"Bebas Neue, sans-serif", fontSize:18, letterSpacing:3, textDecoration:"none", boxShadow:"0 0 20px " + info.color + "22" }}>
                  {"💳 PURCHASE THIS REQUEST"}
                </a>
              )}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Game Library Page ────────────────────────────────────────────────────────
const PLAY_LEVELS = [
  { level: 0, label: "Never Played",       color: "#4a6a4a" },
  { level: 1, label: "Played A Bit",       color: "#67e8f9" },
  { level: 2, label: "Played Moderately",  color: "#a78bfa" },
  { level: 3, label: "Played A Ton",       color: "#f97316" },
  { level: 4, label: "Played Obsessively", color: "#4ade80" },
];
const CONSOLES = ["All","Steam","Nintendo Switch","Wii U","Wii/GameCube","Nintendo 64","Super Nintendo","NES","SEGA Genesis","Gameboy/GBC","Gameboy Advance","Randomizers","Crowd Control","Other"];

function GameLibraryPage({ onBack, isAdmin, gameLibrary, setGameLibrary }) {
  React.useEffect(() => {
    if (gameLibrary.length > 0) return;
    window._fetchStaticData('game_library_default', function(err, data) {
      if (!err && data) setGameLibrary(data);
    });
  }, []);
  const [search, setSearch] = useState("");
  const [consoleFilter, setConsoleFilter] = useState("All");
  const [levelFilter, setLevelFilter] = useState(null);
  const [sortBy, setSortBy] = useState("az"); // az | za | level_asc | level_desc
  const [addOpen, setAddOpen] = useState(false);
  const [newGame, setNewGame] = useState({ name:"", console:"Steam", level:0 });

  const filtered = gameLibrary
    .filter(g => {
      if (consoleFilter !== "All" && g.console !== consoleFilter) return false;
      if (levelFilter !== null && g.level !== levelFilter) return false;
      if (search && !g.name.toLowerCase().includes(search.toLowerCase())) return false;
      return true;
    })
    .sort((a, b) => {
      if (sortBy === "az") return a.name.localeCompare(b.name);
      if (sortBy === "za") return b.name.localeCompare(a.name);
      if (sortBy === "level_desc") return b.level - a.level || a.name.localeCompare(b.name);
      if (sortBy === "level_asc") return a.level - b.level || a.name.localeCompare(b.name);
      return 0;
    });

  const inp = { background:"#060e06", border:"1px solid #2a4a2a", borderRadius:3, padding:"7px 10px", color:"#c8e6c8", fontFamily:"Barlow, sans-serif", fontSize:15, outline:"none" };

  return (
    <div style={{ minHeight:"100vh", background:"#040c04", color:"#c8e6c8", padding:"20px 16px" }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap');`}</style>

      <div style={{ maxWidth:1100, margin:"0 auto" }}>
        {/* Header */}
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:24, flexWrap:"wrap", gap:12 }}>
          <div>
            <div style={{ fontFamily:"Bebas Neue, sans-serif", fontSize:"clamp(28px,5vw,48px)", letterSpacing:3, background:"linear-gradient(160deg,#facc15,#4ade80)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent", lineHeight:1 }}>
              {"🎮 GAME LIBRARY"}
            </div>
            <div style={{ fontFamily:"Barlow, sans-serif", fontSize:14, color:"#6a9e6a", letterSpacing:2, fontStyle:"italic" }}>
              {gameLibrary.length} games owned — {filtered.length} shown
            </div>
          </div>
          <button onClick={onBack} style={{ padding:"8px 20px", borderRadius:3, border:"1px solid #2a4a2a", background:"none", color:"#6a9e6a", fontFamily:"Bebas Neue, sans-serif", fontSize:16, letterSpacing:2, cursor:"pointer" }}>
            {"← BACK"}
          </button>
        </div>

        {/* Search + Sort */}
        <div style={{ display:"flex", gap:10, marginBottom:12, flexWrap:"wrap" }}>
          <div style={{ flex:1, minWidth:200, position:"relative" }}>
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search games..."
              style={{ ...inp, width:"100%", boxSizing:"border-box", paddingRight:32 }} />
            {search && <button onClick={() => setSearch("")} style={{ position:"absolute", right:8, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", color:"#6a9e6a", cursor:"pointer", fontSize:16 }}>✕</button>}
          </div>
          <select value={sortBy} onChange={e => setSortBy(e.target.value)}
            style={{ ...inp, cursor:"pointer", colorScheme:"dark" }}>
            <option value="az">A → Z</option>
            <option value="za">Z → A</option>
            <option value="level_desc">Most Played First</option>
            <option value="level_asc">Least Played First</option>
          </select>
        </div>

        {/* Console filter */}
        <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:10 }}>
          {CONSOLES.map(c => (
            <button key={c} onClick={() => setConsoleFilter(c)}
              style={{ padding:"5px 12px", borderRadius:3, border:"1px solid " + (consoleFilter===c ? "#4ade8066" : "#1a3a1a"), background: consoleFilter===c ? "#0a2018" : "none", color: consoleFilter===c ? "#4ade80" : "#4a6a4a", fontFamily:"Bebas Neue, sans-serif", fontSize:12, letterSpacing:1, cursor:"pointer" }}>
              {c}
            </button>
          ))}
        </div>

        {/* Play level filter */}
        <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:16, alignItems:"center" }}>
          <span style={{ fontFamily:"Barlow, sans-serif", fontSize:12, color:"#4a6a4a", letterSpacing:1 }}>FILTER BY:</span>
          {PLAY_LEVELS.map(pl => (
            <button key={pl.level} onClick={() => setLevelFilter(levelFilter === pl.level ? null : pl.level)}
              style={{ padding:"4px 12px", borderRadius:3, border:"1px solid " + (levelFilter===pl.level ? pl.color+"88" : "#1a3a1a"), background: levelFilter===pl.level ? pl.color+"22" : "none", color: levelFilter===pl.level ? pl.color : "#4a6a4a", fontFamily:"Barlow, sans-serif", fontSize:12, cursor:"pointer" }}>
              {pl.label}
            </button>
          ))}
        </div>

        {/* Add game (admin only) */}
        {isAdmin && (
          <div style={{ marginBottom:16 }}>
            {addOpen ? (
              <div style={{ background:"#0a1a0a", border:"1px solid #2a4a2a", borderRadius:4, padding:"16px 18px", display:"flex", gap:10, flexWrap:"wrap", alignItems:"flex-end" }}>
                <div style={{ flex:2, minWidth:180 }}>
                  <div style={{ fontFamily:"Barlow, sans-serif", fontSize:12, color:"#4a6a4a", marginBottom:4 }}>GAME NAME</div>
                  <input value={newGame.name} onChange={e => setNewGame(g => ({...g, name:e.target.value}))}
                    placeholder="Game title..." style={{ ...inp, width:"100%", boxSizing:"border-box" }} />
                </div>
                <div style={{ flex:1, minWidth:140 }}>
                  <div style={{ fontFamily:"Barlow, sans-serif", fontSize:12, color:"#4a6a4a", marginBottom:4 }}>CONSOLE</div>
                  <select value={newGame.console} onChange={e => setNewGame(g => ({...g, console:e.target.value}))}
                    style={{ ...inp, width:"100%", boxSizing:"border-box", colorScheme:"dark" }}>
                    {CONSOLES.filter(c => c !== "All").map(c => <option key={c} value={c}>{c}</option>)}
                  </select>
                </div>
                <div style={{ flex:1, minWidth:160 }}>
                  <div style={{ fontFamily:"Barlow, sans-serif", fontSize:12, color:"#4a6a4a", marginBottom:4 }}>PLAYED LEVEL</div>
                  <select value={newGame.level} onChange={e => setNewGame(g => ({...g, level:parseInt(e.target.value)}))}
                    style={{ ...inp, width:"100%", boxSizing:"border-box", colorScheme:"dark" }}>
                    {PLAY_LEVELS.map(pl => <option key={pl.level} value={pl.level}>{pl.level} — {pl.label}</option>)}
                  </select>
                </div>
                <div style={{ display:"flex", gap:8 }}>
                  <button onClick={() => setAddOpen(false)}
                    style={{ padding:"8px 16px", borderRadius:3, border:"1px solid #1a3a1a", background:"none", color:"#4a6a4a", fontFamily:"Bebas Neue, sans-serif", fontSize:14, letterSpacing:2, cursor:"pointer" }}>CANCEL</button>
                  <button onClick={() => { if (newGame.name.trim()) { setGameLibrary(lib => [...lib, { ...newGame, name: newGame.name.trim() }]); setNewGame({ name:"", console:"Steam", level:0 }); setAddOpen(false); } }}
                    style={{ padding:"8px 16px", borderRadius:3, border:"1px solid #4ade8066", background:"#0a2018", color:"#4ade80", fontFamily:"Bebas Neue, sans-serif", fontSize:14, letterSpacing:2, cursor:"pointer" }}>+ ADD</button>
                </div>
              </div>
            ) : (
              <button onClick={() => setAddOpen(true)}
                style={{ padding:"8px 20px", borderRadius:3, border:"1px solid #2a5a3a", background:"#0a1a0a", color:"#4ade80", fontFamily:"Bebas Neue, sans-serif", fontSize:15, letterSpacing:2, cursor:"pointer" }}>
                + ADD GAME
              </button>
            )}
          </div>
        )}

        {/* Game grid */}
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))", gap:8 }}>
          {filtered.map((g, i) => {
            const pl = PLAY_LEVELS[g.level];
            const globalIdx = gameLibrary.indexOf(g);
            return (
              <div key={i} style={{ background:"#0a1a0a", border:"1px solid #1a2a1a", borderRadius:3, padding:"10px 14px", display:"flex", alignItems:"center", gap:10, borderLeft:"3px solid " + pl.color }}>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontFamily:"Barlow, sans-serif", fontSize:15, color:"#c8e6c8", fontWeight:600, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }} title={g.name}>{g.name}</div>
                  <div style={{ fontFamily:"Barlow, sans-serif", fontSize:11, color:"#4a6a4a", letterSpacing:1 }}>{g.console}</div>
                </div>
                <div style={{ flexShrink:0, textAlign:"right" }}>
                  <div style={{ fontFamily:"Bebas Neue, sans-serif", fontSize:11, letterSpacing:1, color:pl.color, whiteSpace:"nowrap" }}>{pl.label}</div>
                  <div style={{ display:"flex", gap:3, justifyContent:"flex-end", marginTop:4 }}>
                    {[0,1,2,3,4].map(n => (
                      <div key={n}
                        onClick={() => isAdmin && setGameLibrary(lib => lib.map((item, j) => j === globalIdx ? {...item, level: n} : item))}
                        title={PLAY_LEVELS[n].label}
                        style={{ width:10, height:10, borderRadius:2, background: n <= g.level ? pl.color : "#1a3a1a", cursor: isAdmin ? "pointer" : "default", transition:"background 0.15s", border: isAdmin ? "1px solid " + (n <= g.level ? pl.color+"88" : "#2a4a2a") : "none" }} />
                    ))}
                  </div>
                  {isAdmin && <div style={{ fontFamily:"Barlow, sans-serif", fontSize:10, color:"#2a4a2a", marginTop:2, letterSpacing:1 }}>click dots to edit</div>}
                </div>
                {isAdmin && (
                  <button onClick={() => setGameLibrary(lib => lib.filter((_, j) => j !== globalIdx))}
                    style={{ background:"none", border:"none", color:"#3a2a2a", fontSize:14, cursor:"pointer", flexShrink:0 }}>✕</button>
                )}
              </div>
            );
          })}
        </div>

        {filtered.length === 0 && (
          <div style={{ textAlign:"center", padding:"40px 0", fontFamily:"Barlow, sans-serif", color:"#2a4a2a", fontStyle:"italic" }}>
            No games found matching your filters.
          </div>
        )}
      </div>
    </div>
  );
}

// ── Donation Notification (admin only) ──────────────────────────────────────
function DonationNotification({ donation, onConfirm, onConfirmExisting, onDismiss, allRequests }) {
  const [selectedTier, setSelectedTier] = useState(null);
  const [confirmingDismiss, setConfirmingDismiss] = useState(false);
  const [showUnfunded, setShowUnfunded] = useState(false);
  if (!donation) return null;
  const { donor, amount, message } = donation;

  // Unfunded requests for the selected tier
  const unfundedForTier = selectedTier && selectedTier !== "NONE"
    ? (allRequests || []).filter(r => {
        if (r.tierName !== selectedTier || r.completed) return false;
        const tier = TIERS.find(t => t.name === r.tierName);
        if (!tier || !tier.canSegment) return false;
        const funded = (r.segments || []).reduce((a, s) => a + Number(s.amount), 0);
        const cap = r.cap || tier.price;
        return funded < cap;
      }).map(r => {
        const tier = TIERS.find(t => t.name === r.tierName);
        const funded = (r.segments || []).reduce((a, s) => a + Number(s.amount), 0);
        const cap = r.cap || tier.price;
        return { ...r, funded, cap };
      })
    : [];

  return (
    <div style={{ position:"fixed", top:20, left:"50%", transform:"translateX(-50%)", zIndex:10000, width:"min(520px, 95vw)" }}>
      <div style={{ background:"linear-gradient(145deg,#071407,#0c1e0c)", border:"2px solid #facc1566", borderRadius:8, overflow:"hidden", boxShadow:"0 0 60px #facc1522, 0 8px 32px rgba(0,0,0,0.8)" }}>
        {/* Header */}
        <div style={{ background:"linear-gradient(90deg,#facc1511,transparent)", borderBottom:"1px solid #facc1533", padding:"14px 20px", display:"flex", alignItems:"center", gap:12 }}>
          <div style={{ fontSize:22 }}>{"💰"}</div>
          <div style={{ flex:1 }}>
            <div style={{ fontFamily:"Bebas Neue, sans-serif", fontSize:13, letterSpacing:3, color:"#facc15", marginBottom:2 }}>NEW DONATION</div>
            <div style={{ fontFamily:"Barlow, sans-serif", fontSize:18, color:"#c8e6c8", fontWeight:600 }}>
              <span style={{ color:"#facc15" }}>${amount.toFixed(2)}</span>{" from "}<span style={{ color:"#7adba0" }}>{donor}</span>
            </div>
          </div>
          <CornerOrnaments color="#facc1544" />
        </div>

        {/* Message */}
        {message && (
          <div style={{ padding:"10px 20px", background:"#040c0488", borderBottom:"1px solid #1a3a1a" }}>
            <div style={{ fontFamily:"Barlow, sans-serif", fontSize:14, color:"#8fbb8f", fontStyle:"italic" }}>{'"'}{message}{'"'}</div>
          </div>
        )}

        {/* Tier picker */}
        <div style={{ padding:"16px 20px" }}>
          <div style={{ fontFamily:"Bebas Neue, sans-serif", fontSize:12, letterSpacing:3, color:"#4a6a4a", marginBottom:10 }}>ASSIGN TO TIER:</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr 1fr", gap:8, marginBottom:16 }}>
            {TIERS.map(tier => (
              <button key={tier.name} onClick={() => { setSelectedTier(tier.name); setShowUnfunded(false); }}
                style={{ padding:"10px 6px", borderRadius:4, border:"2px solid " + (selectedTier === tier.name ? tier.color : tier.color + "44"), background: selectedTier === tier.name ? tier.color + "33" : tier.color + "11", color: selectedTier === tier.name ? tier.color : tier.color + "99", fontFamily:"Bebas Neue, sans-serif", fontSize:14, letterSpacing:1, cursor:"pointer", transition:"all 0.15s", display:"flex", flexDirection:"column", alignItems:"center", gap:3 }}>
                <span style={{ fontSize:18 }}>{TIER_IMGS[tier.name] ? <img src={TIER_IMGS[tier.name]} style={{width:24,height:24,objectFit:"contain"}} /> : tier.emoji}</span>
                {tier.name}
                <span style={{ fontSize:10, opacity:0.7 }}>${tier.price}</span>
              </button>
            ))}
            <button onClick={() => { setSelectedTier("NONE"); setShowUnfunded(false); }}
              style={{ padding:"10px 6px", borderRadius:4, border:"2px solid " + (selectedTier === "NONE" ? "#a0a0b8" : "#2a3a4a"), background: selectedTier === "NONE" ? "#1a1a2a" : "#0d0d1a", color: selectedTier === "NONE" ? "#a0a0b8" : "#4a5a6a", fontFamily:"Bebas Neue, sans-serif", fontSize:12, letterSpacing:1, cursor:"pointer", transition:"all 0.15s", display:"flex", flexDirection:"column", alignItems:"center", gap:3 }}>
              <span style={{ fontSize:18 }}>{"💵"}</span>
              NO TIER
              <span style={{ fontSize:10, opacity:0.7 }}>log only</span>
            </button>
          </div>

          {/* Action buttons row */}
          <button onClick={() => selectedTier && onConfirm(selectedTier)}
            disabled={!selectedTier}
            style={{ width:"100%", padding:"12px", borderRadius:4, border:"1px solid " + (selectedTier ? "#4ade8066" : "#1a3a1a"), background: selectedTier ? "#0a2018" : "none", color: selectedTier ? "#4ade80" : "#2a4a2a", fontFamily:"Bebas Neue, sans-serif", fontSize:16, letterSpacing:2, cursor: selectedTier ? "pointer" : "default", transition:"all 0.15s", marginBottom:8 }}>
            {"✓ CONFIRM "}{selectedTier || "..."}
          </button>

          {/* UNFUNDED button — only show when a segmentable tier is selected and there are unfunded requests */}
          {unfundedForTier.length > 0 && (
            <div style={{ marginBottom:8, position:"relative" }}>
              <button onClick={() => setShowUnfunded(v => !v)}
                style={{ width:"100%", padding:"10px", borderRadius:4, border:"1px solid #facc1544", background: showUnfunded ? "#facc1511" : "none", color:"#facc15", fontFamily:"Bebas Neue, sans-serif", fontSize:14, letterSpacing:2, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
                UNFUNDED ({unfundedForTier.length})
                <span style={{ fontSize:10 }}>{showUnfunded ? "▲" : "▼"}</span>
              </button>
              {showUnfunded && (
                <div style={{ position:"absolute", top:"100%", left:0, right:0, zIndex:10, background:"#0c1e0c", border:"1px solid #facc1533", borderRadius:4, marginTop:4, maxHeight:220, overflowY:"auto" }}>
                  {unfundedForTier.map(r => {
                    const tier = TIERS.find(t => t.name === r.tierName);
                    const pct = Math.round((r.funded / r.cap) * 100);
                    return (
                      <button key={r.id}
                        onClick={() => { onConfirmExisting(r.id, { name: donor, amount: String(amount) }); setShowUnfunded(false); }}
                        style={{ width:"100%", padding:"10px 14px", background:"none", border:"none", borderBottom:"1px solid #1a3a1a", cursor:"pointer", textAlign:"left", display:"flex", flexDirection:"column", gap:4 }}>
                        <div style={{ fontFamily:"Bebas Neue, sans-serif", fontSize:15, color: tier ? tier.color : "#c8e6c8", letterSpacing:1 }}>{r.title || "(untitled)"}</div>
                        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                          <div style={{ flex:1, height:4, background:"#1a3a1a", borderRadius:2, overflow:"hidden" }}>
                            <div style={{ height:"100%", width: pct + "%", background: tier ? tier.color : "#4ade80", borderRadius:2 }} />
                          </div>
                          <span style={{ fontFamily:"Barlow, sans-serif", fontSize:12, color:"#6a9e6a", flexShrink:0 }}>${r.funded} / ${r.cap}</span>
                        </div>
                        {r.requester && <div style={{ fontFamily:"Barlow, sans-serif", fontSize:12, color:"#4a6a4a", fontStyle:"italic" }}>by {r.requester}</div>}
                      </button>
                    );
                  })}
                </div>
              )}
            </div>
          )}

          {/* Dismiss — two-tap to prevent accidents */}
          {!confirmingDismiss ? (
            <button onClick={() => setConfirmingDismiss(true)}
              style={{ width:"100%", padding:"7px", borderRadius:4, border:"1px solid #1a2a1a", background:"none", color:"#2a4a2a", fontFamily:"Bebas Neue, sans-serif", fontSize:12, letterSpacing:2, cursor:"pointer" }}>

                style={{ flex:1, padding:"7px", borderRadius:4, border:"1px solid #2a4a2a", background:"none", color:"#6a9e6a", fontFamily:"Bebas Neue, sans-serif", fontSize:12, letterSpacing:2, cursor:"pointer" }}>

                YES, DISMISS
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Goal Edit Modal ──────────────────────────────────────────────────────────
function GoalEditModal({ goal, stretchGoals, rupeeOffset, setRupeeOffset, onSave, onClose }) {
  const [goalVal, setGoalVal] = React.useState(String(goal));
  const [offsetVal, setOffsetVal] = React.useState(String(rupeeOffset || 0));
  const [stretches, setStretches] = React.useState(
    stretchGoals.length > 0 ? stretchGoals : [{ amount: "", label: "" }]
  );
  const inp = { width:"100%", background:"#060e06", border:"1px solid #2a4a2a", borderRadius:3, padding:"9px 12px", color:"#c8e6c8", fontFamily:"Barlow, sans-serif", fontSize:14, outline:"none", boxSizing:"border-box" };
  const lbl = { fontFamily:"Barlow, sans-serif", fontSize:11, letterSpacing:3, color:"#6b8f6b", display:"block", marginBottom:5 };

  function updateStretch(i, field, val) {
    var next = stretches.map(function(s, idx) { return idx === i ? Object.assign({}, s, { [field]: val }) : s; });
    setStretches(next);
  }
  function addStretch() { setStretches(stretches.concat([{ amount: "", label: "" }])); }
  function removeStretch(i) { setStretches(stretches.filter(function(_, idx) { return idx !== i; })); }

  function handleSave() {
    var g = parseInt(goalVal, 10);
    if (isNaN(g) || g <= 0) { alert("Goal must be a positive number."); return; }
    var off = parseFloat(offsetVal) || 0;
    var sg = stretches
      .filter(function(s) { return s.amount && s.label; })
      .map(function(s) { return { amount: parseInt(s.amount, 10), label: s.label }; })
      .sort(function(a, b) { return a.amount - b.amount; });
    setRupeeOffset(off);
    onSave(g, sg);
  }

  return (
    <div
      style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.85)", zIndex:9999, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
      <div style={{ background:"linear-gradient(160deg,#0d1f0d,#091409)", border:"1px solid #4ade8066", borderRadius:6, padding:28, width:"100%", maxWidth:460, boxShadow:"0 0 60px #4ade8022", maxHeight:"90vh", overflowY:"auto" }}>
        <div style={{ fontFamily:"Bebas Neue, sans-serif", fontSize:24, letterSpacing:4, color:"#4ade80", marginBottom:18 }}>EDIT GOAL</div>

        <div style={{ marginBottom:18 }}>
          <label style={lbl}>DONATION GOAL (RUPEES)</label>
          <input type="number" value={goalVal} onChange={function(e) { setGoalVal(e.target.value); }} style={inp} />
        </div>

        <div style={{ marginBottom:18 }}>
          <label style={lbl}>MANUAL RUPEE ADJUSTMENT</label>
          <div style={{ display:"flex", gap:8, alignItems:"center" }}>
            <button onClick={function() { setOffsetVal(String((parseFloat(offsetVal)||0) - 1)); }}
              style={{ padding:"6px 14px", borderRadius:3, border:"1px solid #f8717144", background:"none", color:"#f87171aa", fontFamily:"Bebas Neue, sans-serif", fontSize:16, cursor:"pointer", flexShrink:0 }}>-</button>
            <input type="number" value={offsetVal} onChange={function(e) { setOffsetVal(e.target.value); }}
              style={Object.assign({}, inp, { textAlign:"center" })} />
            <button onClick={function() { setOffsetVal(String((parseFloat(offsetVal)||0) + 1)); }}
              style={{ padding:"6px 14px", borderRadius:3, border:"1px solid #4ade8044", background:"none", color:"#4ade80aa", fontFamily:"Bebas Neue, sans-serif", fontSize:16, cursor:"pointer", flexShrink:0 }}>+</button>
          </div>
          <div style={{ fontFamily:"Barlow, sans-serif", fontSize:11, color:"#4a6a4a", marginTop:5 }}>
            {(parseFloat(offsetVal)||0) === 0
              ? "No adjustment — displayed total matches donations exactly."
              : (parseFloat(offsetVal) > 0
                  ? "Adding " + Math.abs(parseFloat(offsetVal)) + " rupees to the displayed total."
                  : "Subtracting " + Math.abs(parseFloat(offsetVal)) + " rupees from the displayed total.")}
          </div>
        </div>

        <div style={{ marginBottom:8 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
            <label style={Object.assign({}, lbl, { marginBottom:0 })}>STRETCH GOALS</label>
            <button onClick={addStretch}
              style={{ padding:"3px 10px", borderRadius:3, border:"1px solid #4ade8044", background:"none", color:"#4ade80aa", fontFamily:"Bebas Neue, sans-serif", fontSize:12, cursor:"pointer", letterSpacing:2 }}>
              + ADD
            </button>
          </div>
          {stretches.map(function(sg, i) {
            return (
              <div key={i} style={{ display:"flex", gap:8, marginBottom:8, alignItems:"center" }}>
                <input type="number" placeholder="Amount" value={sg.amount} onChange={function(e) { updateStretch(i, "amount", e.target.value); }}
                  style={Object.assign({}, inp, { width:110, flex:"0 0 110px" })} />
                <input type="text" placeholder="Label (e.g. Bonus stream)" value={sg.label} onChange={function(e) { updateStretch(i, "label", e.target.value); }}
                  style={Object.assign({}, inp, { flex:1 })} />
                <button onClick={function() { removeStretch(i); }}
                  style={{ width:28, height:28, borderRadius:3, border:"1px solid #f8717144", background:"none", color:"#f87171aa", fontSize:16, cursor:"pointer", flexShrink:0 }}>
                  x
                </button>
              </div>
            );
          })}
        </div>

        <div style={{ display:"flex", gap:10, marginTop:20 }}>
          <button onClick={onClose}
            style={{ flex:1, padding:"10px 0", borderRadius:3, border:"1px solid #2a4a2a", background:"none", color:"#6a9e6a", fontFamily:"Bebas Neue, sans-serif", fontSize:15, letterSpacing:2, cursor:"pointer" }}>
            CANCEL
          </button>
          <button onClick={handleSave}
            style={{ flex:2, padding:"10px 0", borderRadius:3, border:"1px solid #4ade8066", background:"#0a2018", color:"#4ade80", fontFamily:"Bebas Neue, sans-serif", fontSize:15, letterSpacing:2, cursor:"pointer" }}>
            SAVE GOAL
          </button>
        </div>
      </div>
    </div>
  );
}

function LoginModal({ onLogin, onClose, error }) {

        <div style={{ fontFamily:"Barlow, sans-serif", fontSize:14, color:"#6a9e6a", marginBottom:24, letterSpacing:1 }}>Enter password to unlock editing</div>
        <input
          type="password"

          onKeyDown={e => e.key === "Enter" && onLogin(pw)}
          placeholder="Password..."
          style={inp}
          autoFocus
        />
        {error && (
          <div style={{ fontFamily:"Barlow, sans-serif", fontSize:13, color:"#f87171", marginTop:8 }}>Incorrect password. Try again.</div>
        )}
        <div style={{ display:"flex", gap:10, marginTop:16 }}>
          <button onClick={onClose}
            style={{ flex:1, fontFamily:"Bebas Neue, sans-serif", fontSize:15, letterSpacing:2, padding:"10px", borderRadius:3, background:"none", border:"1px solid #2a4a2a", color:"#6a9e6a", cursor:"pointer" }}>

            UNLOCK
          </button>
        </div>
      </div>
    </div>
  );
}

  const idRef = useRef(0);

  // ── Streamlabs Socket API connection ────────────────────────────────────
  // Only connect if a token is stored in this browser (admin's browser only)
  const SOCKET_TOKEN = localStorage.getItem("tracker-socket-token") || "";

  useEffect(() => {
    if (!storageReady) return;
    if (!SOCKET_TOKEN) { setSocketStatus("disconnected"); return; } // no token = viewer browser, skip silently
    let socket = null;
    let reconnectTimer = null;

    const connect = () => {
      try {
        socket = new WebSocket(`wss://sockets.streamlabs.com/socket.io/?token=${SOCKET_TOKEN}&EIO=3&transport=websocket`);
        socket.onopen = () => { console.log("Streamlabs connected"); setSocketStatus("connected"); };
        socket.onmessage = (event) => {
          const raw = event.data;
          if (!raw.startsWith("42")) return;
          try {
            const parsed = JSON.parse(raw.slice(2));
            if (parsed[0] !== "event") return;
            const data = parsed[1];
            if (data.type !== "donation" || !(data.message && data.message.length)) return;
            data.message.forEach(d => {
              const entry = {
                id: Date.now() + Math.random(),
                donor: d.name || "Anonymous",
                amount: parseFloat(d.amount) || 0,
                message: d.message || "",
                receivedAt: new Date().toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"}),
                receivedDate: new Date().toLocaleDateString(),
              };
              setDonationQueue(q => [...q, entry]);
              setDonationLog(l => [entry, ...l].slice(0, 100));
            });
          } catch(e) {}
        };
        socket.onclose = () => {
          console.log("Streamlabs disconnected, reconnecting in 5s...");
          setSocketStatus("disconnected");
          reconnectTimer = setTimeout(connect, 5000);
        };
        const heartbeat = setInterval(() => {
          if (socket && socket.readyState === WebSocket.OPEN) socket.send("2");
        }, 25000);
        socket._hb = heartbeat;
      } catch(e) {
        reconnectTimer = setTimeout(connect, 5000);
      }
    };

    connect();
    return () => {
      clearTimeout(reconnectTimer);
      if (socket) { if (socket._hb) clearInterval(socket._hb); socket.onclose = null; socket.close(); }
    };
  }, [storageReady]);

  // Keep ref in sync and trigger save when historyRows changes
  useEffect(() => {

      if (!d) return;

      if (d.infoContent)      setInfoContent(function(c) { return Object.assign({}, c, d.infoContent); });

      if (typeof d.rupeeOffset === "number") setRupeeOffset(d.rupeeOffset);
      if (d.historyRowsExtra) {

          Object.keys(d.historyRowsExtra).forEach(function(ev) {
            var defaults = (h[ev] || []).filter(function(r) { return r.type === "event_banner" || r.type === "event_subheader"; });
            var stored   = (d.historyRowsExtra[ev] || []).filter(function(r) { return r.type !== "event_banner" && r.type !== "event_subheader"; });
            var storedIds = new Set(stored.map(function(r) { return r.id; }));
            var newBanners = defaults.filter(function(r) { return !storedIds.has(r.id); });
            merged[ev] = newBanners.concat(stored).sort(function(a,b) { return a.id - b.id; });
          });
          return merged;
        });
      }
      if (d.idRefCurrent) idRef.current = d.idRefCurrent;
    }

    // Load state from Supabase (visible to all visitors instantly)
    window._loadPublishedState(
      function(data) { applyData(data); setStorageReady(true); },
      function() {
        // No Supabase state yet — start fresh
        setStorageReady(true);
      }
    );

    // Start polling for realtime updates (non-admins see changes within 5s)
    // Pauses while admin has a modal open to prevent wiping in-progress edits
    var unsubscribe = window._subscribeState(function(data) {
      if (window._modalOpen) return;
      applyData(data);
    });

    return function() { if (unsubscribe) unsubscribe(); };
  }, []);

            Object.keys(d.historyRowsExtra).forEach(ev => {

                      style={{ flex:1, background:"#060e06", border:"1px solid #2a1a3a", borderRadius:3, padding:"6px 10px", color:"#a78bfa", fontFamily:S.barlow, fontSize:15, outline:"none" }}
                    />
                  </div>
                )}

                <div style={{ display:"flex", flexDirection:"column", gap:6, maxHeight:280, overflowY:"auto" }}>
                  {wheelRequests.length === 0 && (
                    <div style={{ fontFamily:S.barlow, fontSize:19, color:"#2a4a2a", fontStyle:"italic", padding:"8px 0" }}>No requests yet.{isAdmin ? " Add some above!" : ""}</div>
                  )}

                    <div
                      key={req.id}
                      className={isAdmin ? "drag-row" : ""}
                      draggable={isAdmin}
                      onDragStart={isAdmin ? e => handleDragStart(e, req.id) : undefined}
                      onDragOver={isAdmin ? e => e.preventDefault() : undefined}
                      onDrop={isAdmin ? e => handleDrop(e, req.id) : undefined}
                      style={{ display:"flex", alignItems:"center", gap:8, background: i < 8 ? "#2a0a1a" : "#1a0a0a", border:"1px solid " + (i < 8 ? "#c0457a44" : "#2a1a1a"), borderLeft:"3px solid " + (i < 8 ? SEG_COLORS[i % SEG_COLORS.length] : "#2a1a1a"), borderRadius:3, padding:"7px 10px" }}>
                      {isAdmin && <span style={{ color:"#4a2a3a", fontSize:16, marginRight:2 }}>⠿</span>}

                      </div>
                      <div style={{ fontFamily:S.barlow, fontSize:15, color:"#4a3a4a" }}>{req.addedAt}</div>
                      {isAdmin && (
                        <button onClick={() => setWheelRequests(r => r.filter(x => x.id !== req.id))}
                          style={{ background:"none", border:"none", color:"#4a2a3a", cursor:"pointer", fontSize:18, padding:"0 2px" }}>✕</button>
                      )}
                    </div>
                  ))}
                </div>

              </div>

              {/* Compiler */}
              <div style={{ background:"#0a1a0a", border:"1px solid #1a3a1a", borderRadius:4, padding:"16px 18px" }}>
                <div style={{ fontFamily:S.bebas, fontSize:21, letterSpacing:3, color:"#f472b6", marginBottom:12 }}>
                  COMPILER
                </div>
                {wheelCompiler.length === 0 && (
                  <div style={{ fontFamily:S.barlow, fontSize:16, color:"#2a4a2a", fontStyle:"italic" }}>{"Empty — spin the wheel to fill it."}</div>
                )}
                <div style={{ display:"flex", flexDirection:"column", gap:6, maxHeight:300, overflowY:"auto" }}>
                  {(() => {
                    // Group by name, preserve insertion order
                    const groups = [];
                    const seen = {};
                    wheelCompiler.forEach(req => {
                      const key = req.name.trim().toLowerCase();
                      if (seen[key] !== undefined) {
                        groups[seen[key]].count++;
                        groups[seen[key]].ids.push(req.id);
                      } else {
                        seen[key] = groups.length;
                        groups.push({ name: req.name, count: 1, ids: [req.id], firstId: req.id });
                      }
                    });

                    return groups.map((g, i) => {
                      const canConvert = g.count >= 8;
                      const countColor = g.count >= 8 ? "#22dd66" : g.count >= 4 ? "#facc15" : "#f87171";
                      return (
                        <div key={g.firstId} style={{ display:"flex", alignItems:"center", gap:8, background:"#0d0d0d", border:"1px solid " + countColor + "33", borderLeft:"3px solid " + countColor, borderRadius:3, padding:"8px 10px" }}>

                            x{g.count}
                          </div>
                          {/* Convert button — only shown at x8, admin only */}
                          {canConvert && isAdmin && (
                            <button
                              onClick={() => {
                                // Remove 8 instances from compiler
                                setWheelCompiler(c => {
                                  let removed = 0;
                                  return c.filter(x => {
                                    if (removed < 8 && x.name.trim().toLowerCase() === g.name.trim().toLowerCase()) {
                                      removed++;
                                      return false;
                                    }
                                    return true;
                                  });
                                });
                                setWheelQueue(q => [...q, {
                                  id: Date.now(),
                                  note: g.name,
                                  convertedAt: new Date().toLocaleDateString(),
                                  count: 8,
                                  autoConverted: false,
                                }]);
                                // Add to quest log as a WHEEL request
                                setRequests(rs => [...rs, {
                                  id: idRef.current++,
                                  tierName: "WHEEL",
                                  title: g.name,
                                  requester: "Wheel Compiler",
                                  details: "Compiled from 8 wheel requests",
                                  date: new Date().toLocaleDateString(),
                                  time: "",
                                  segments: [],
                                  completed: false,
                                }]);
                              }}
                              style={{ fontFamily:S.bebas, fontSize:14, letterSpacing:1, padding:"5px 10px", borderRadius:3, background:"#002a10", border:"1px solid #22dd6688", color:"#22dd66", cursor:"pointer", whiteSpace:"nowrap" }}>
                              CONVERT ✓
                            </button>
                          )}
                          {/* Remove one instance — admin only */}
                          {isAdmin && (
                            <button onClick={() => setWheelCompiler(c => { const idx = c.findIndex(x => x.name.trim().toLowerCase() === g.name.trim().toLowerCase()); return c.filter((_, i) => i !== idx); })}
                              style={{ background:"none", border:"none", color:"#3a4a3a", cursor:"pointer", fontSize:18, padding:"0 2px" }}>✕</button>
                          )}
                        </div>
                      );
                    });

              </div>
            </div>

          {/* Wheel Stats */}
          {wheelSpinHistory.length > 0 && (() => {
            // Most spun games (from winners)
            const winCounts = {};
            wheelSpinHistory.forEach(s => { winCounts[s.winner] = (winCounts[s.winner]||0) + 1; });
            const topWinners = Object.entries(winCounts).sort((a,b) => b[1]-a[1]).slice(0,5);

            // Most compiled games
            const compCounts = {};

            const topCompiled = Object.entries(compCounts).sort((a,b) => b[1]-a[1]).slice(0,5);

                  {topWinners.length > 0 && (

                    </div>

                  {topCompiled.length > 0 && (
                    <div>
                      <div style={{ fontFamily:S.bebas, fontSize:13, letterSpacing:3, color:"#facc15", marginBottom:8 }}>📦 TOP COMPILED</div>

                          <span style={{ fontFamily:S.bebas, fontSize:14, color: count>=8 ? "#22dd66" : count>=4 ? "#facc15" : "#f87171", letterSpacing:1 }}>x{count}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            );
          })()}

          {/* Spin History */}
          <div style={{ background:"#0a1a0a", border:"1px solid #1a3a1a", borderRadius:4, padding:"16px 18px" }}>
            <div style={{ fontFamily:S.bebas, fontSize:21, letterSpacing:3, color:"#a78bfa", marginBottom:12 }}>

            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              {[...wheelSpinHistory].reverse().map((spin, i) => (
                <div key={spin.id} style={{ background:"#0d0d0d", border:"1px solid #a78bfa33", borderLeft:"3px solid #a78bfa", borderRadius:3, padding:"10px 14px" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6, flexWrap:"wrap", gap:8 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                      <div style={{ fontFamily:S.bebas, fontSize:19, color:"#a78bfa", letterSpacing:2 }}>SPIN #{wheelSpinHistory.length - i}</div>
                      {spin.batchLabel && (
                        <div style={{ fontFamily:S.barlow, fontSize:14, color:"#7a6a9a", background:"#1a0a2a", border:"1px solid #a78bfa33", borderRadius:3, padding:"2px 8px" }}>
                          {spin.batchLabel}
                        </div>
                      )}
                    </div>
                    <div style={{ fontFamily:S.barlow, fontSize:16, color:"#6a5a8a" }}>{spin.date}</div>
                  </div>
                  <div style={{ display:"flex", gap:8, flexWrap:"wrap", alignItems:"center" }}>
                    <div style={{ background:"#22dd6622", border:"1px solid #22dd6666", borderRadius:3, padding:"4px 10px", fontFamily:S.barlow, fontSize:18, color:"#22dd66", fontWeight:600 }}>
                      {"🏆 "}{spin.winner}{spin.winnerDonator ? " ("+spin.winnerDonator+")" : ""}
                    </div>
                    {spin.games && <div style={{ fontFamily:S.barlow, fontSize:17, color:"#7adba0", fontStyle:"italic" }}>→ {spin.games}</div>}
                  </div>
                  {spin.losers && spin.losers.length > 0 && (
                    <div style={{ marginTop:6, fontFamily:S.barlow, fontSize:16, color:"#4a6a4a" }}>
                      To compiler: {spin.losers.join(", ")}
                    </div>
                  )}
                </div>
              ))}
            </div>
          </div>

        </div>
      </div>
    );

          <div style={{ textAlign:"center", marginBottom:32, paddingTop:8 }}>
            <div style={{ fontFamily:S.bebas, fontSize:"clamp(28px,5vw,44px)", letterSpacing:4, background:"linear-gradient(160deg,#38bdf8,#7dd3fc)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent", marginBottom:4 }}>ATTACKINGTUCANS</div>
            <div style={{ fontFamily:S.barlow, fontSize:14, color:"#4a7a9e", letterSpacing:3, fontStyle:"italic" }}>Find us everywhere</div>

                  const isFull = !tier.canSegment || funded >= tier.price || !!req.amount;
                  return (
                    <div key={req.id} style={{ background:"#060e06", borderRadius:3, borderLeft:"3px solid " + (req.completed ? "#7adba0" : tier.color), animation:"fadeSlide 0.3s ease", overflow:"hidden", opacity: req.completed ? 0.7 : 1 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:12, padding:"13px 16px", fontFamily:S.barlow }}>
                        <span style={{ fontSize:25, flexShrink:0, animation:"floatY 3s ease-in-out infinite" }}>{TIER_IMGS[req.tierName] ? <img src={TIER_IMGS[req.tierName]} style={{width:28,height:28,objectFit:"contain"}} alt="" /> : tier.emoji}</span>
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap", marginBottom:3 }}>
                            <div style={{ fontSize:20, color: req.completed ? "#7adba0" : (req.title ? "#c8e6c8" : "#6a9e6a"), fontWeight:600, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis", textDecoration: req.completed ? "line-through" : "none" }}>
                              {req.title || ("Unnamed " + tier.zelda)}
                            </div>
                            {req.completed && (
                              <span style={{ fontSize:12, padding:"2px 8px", borderRadius:2, background:"#7adba022", border:"1px solid #7adba066", color:"#7adba0", fontFamily:S.bebas, letterSpacing:1, flexShrink:0 }}>✓ COMPLETE</span>
                            )}
                            {tier.canSegment && (
                              <div style={{ fontSize:13, padding:"2px 8px", borderRadius:2, background: isFull ? "#4ade8022" : "#facc1511", border:"1px solid " + (isFull ? "#4ade8066" : "#facc1544"), color: isFull ? "#4ade80" : "#facc15", fontFamily:S.bebas, letterSpacing:1, whiteSpace:"nowrap", flexShrink:0 }}>
                                {isFull ? fmt(req.amount || funded || tier.price) + " DONATED" : fmt(funded) + " / " + fmt(tier.price)}
                              </div>
                            )}
                          </div>
                          <div style={{ fontSize:16, color:"#8fbb8f", display:"flex", gap:10, flexWrap:"wrap", alignItems:"center" }}>
                            <span style={{ color:tier.color, fontWeight:700 }}>{req.amount != null ? fmt(req.amount) : (funded > 0 ? fmt(funded) : fmt(tier.price))}</span>
                            {req.requester && <span style={{ color:"#a3d9a3" }}>{"@ " + req.requester}</span>}
                            {(req.donationDate || req.donationTime) && (
                              <span style={{ color:"#6a9e6a", fontSize:14 }}>
                                {"Donation Made: "}{req.donationDate || ""}{req.donationDate && req.donationTime ? "  " : ""}{req.donationTime || ""}
                              </span>
                            )}
                            {(req.date || req.time) && (
                              <span style={{ color:"#8fbb8f", fontSize:14 }}>
                                {req.completed ? "Played: " : "Date Playing: "}{req.date || ""}{req.date && req.time ? "  " : ""}{req.time || ""}
                              </span>
                            )}
                            {req.details && <span style={{ color:"#7aaa7a", fontStyle:"italic", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", maxWidth:160 }}>{req.details}</span>}
                          </div>
                        </div>
                        {isAdmin && questSort === "manual" && (() => {
                          const idx = requests.findIndex(r => r.id === req.id);
                          const moveUp = () => {
                            if (idx === 0) return;
                            pushUndo("Reorder quest");
                            setRequests(rs => {
                              const next = [...rs];
                              [next[idx-1], next[idx]] = [next[idx], next[idx-1]];
                              return next;
                            });
                          };
                          const moveDown = () => {
                            if (idx === requests.length - 1) return;
                            pushUndo("Reorder quest");
                            setRequests(rs => {
                              const next = [...rs];
                              [next[idx], next[idx+1]] = [next[idx+1], next[idx]];
                              return next;
                            });
                          };
                          return (
                            <div style={{ display:"flex", flexDirection:"column", gap:2, flexShrink:0 }}>
                              <button onClick={moveUp} disabled={idx === 0}
                                style={{ padding:"2px 8px", borderRadius:3, border:"1px solid #2a4a2a", background:"none", color: idx === 0 ? "#2a4a2a" : "#7adba0", fontFamily:S.bebas, fontSize:16, cursor: idx === 0 ? "default" : "pointer", lineHeight:1 }}>
                                {"▲"}
                              </button>
                              <button onClick={moveDown} disabled={idx === requests.length - 1}
                                style={{ padding:"2px 8px", borderRadius:3, border:"1px solid #2a4a2a", background:"none", color: idx === requests.length - 1 ? "#2a4a2a" : "#7adba0", fontFamily:S.bebas, fontSize:16, cursor: idx === requests.length - 1 ? "default" : "pointer", lineHeight:1 }}>
                                {"▼"}
                              </button>
                            </div>
                          );
                        })()}
                        {isAdmin && (
                          <button onClick={() => setRequests(rs => rs.map(r => r.id === req.id ? Object.assign({}, r, { completed: !r.completed }) : r))}
                            style={{ padding:"6px 14px", borderRadius:3, border:"1px solid " + (req.completed ? "#3a8a5a" : "#2a5a2a"), background: req.completed ? "#0a2018" : "none", color: req.completed ? "#7adba0" : "#6a9e6a", fontFamily:S.bebas, fontSize:14, letterSpacing:1, cursor:"pointer", flexShrink:0, whiteSpace:"nowrap" }}>
                            {req.completed ? "✓ DONE" : "COMPLETE"}
                          </button>
                        )}
                        {isAdmin && (
                          <button className="edit-btn" onClick={() => setEditingId(req.id)}
                            style={{ padding:"6px 14px", borderRadius:3, border:"1px solid #2a5a2a", background:"none", color:"#8fbb8f", fontFamily:S.barlow, fontSize:16, cursor:"pointer", flexShrink:0 }}>Edit</button>
                        )}
                        {isAdmin && (
                          <button className="del-btn" onClick={() => confirmDeleteReq(
                              `Remove "${req.title || tier.zelda}" from the quest log?`,
                              () => deleteRequest(req.id)
                            )}
                            style={{ padding:"6px 14px", borderRadius:3, border:"1px solid #2a5a2a", background:"none", color:"#8fbb8f", fontFamily:S.barlow, fontSize:16, cursor:"pointer", flexShrink:0 }}>Delete</button>
                        )}
                      </div>
                      {hasSegs && (
                        <div style={{ padding:"0 16px 12px 52px" }}>
                          <div style={{ height:8, background:"#040c04", borderRadius:2, overflow:"hidden", border:"1px solid #1a3a1a", marginBottom:7, display:"flex" }}>
                            {req.segments.map((s, si) => {
                              const w = Math.min((Number(s.amount)/tier.price)*100, 100);
                              const cc = s.color || getCC(si);
                              return <div key={si} style={{ height:"100%", width:w+"%", background:cc, borderRight: si<req.segments.length-1 ? "1px solid #040c04" : "none" }} />;
                            })}
                          </div>
                          <div style={{ display:"flex", flexWrap:"wrap", gap:6, alignItems:"center" }}>
                            {req.segments.map((s, si) => {
                              const cc = s.color || getCC(si);
                              return (
                                <div key={si} style={{ display:"flex", alignItems:"center", gap:5, fontFamily:S.barlow, fontSize:15, background:"#0a1a0a", padding:"3px 10px", borderRadius:2, border:"1px solid " + cc + "44" }}>
                                  <div style={{ width:6, height:6, borderRadius:"50%", background:cc, flexShrink:0 }} />
                                  <span style={{ color:cc }}>{s.name}</span>
                                  <span style={{ color:cc }}>{fmt(s.amount)}</span>
                                </div>
                              );
                            })}
                            {!isFull && <span style={{ fontFamily:S.barlow, fontSize:14, color:"#6a9e6a", fontStyle:"italic" }}>{"+ " + fmt(tier.price - funded) + " still needed"}</span>}
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        <div style={{ textAlign:"center", marginTop:20, fontFamily:S.barlow, fontSize:14, color:"#4a7a4a", letterSpacing:4, fontStyle:"italic" }}>
          It is dangerous to go alone. Donate something.
        </div>
        <div style={{ display:"flex", justifyContent:"center", marginTop:8, gap:16 }}>
          {TIERS.map(t => <div key={t.name} style={{ width:4, height:4, borderRadius:"50%", background:t.color, boxShadow:"0 0 6px " + t.color, opacity:0.4 }} />)}
        </div>

        {/* Donation Audit Log */}
        <div style={{ marginTop:32, background:"linear-gradient(160deg,#0a1a0a,#060e06)", border:"1px solid #1a3a1a", borderRadius:4, overflow:"hidden" }}>
          <div style={{ padding:"12px 18px", borderBottom:"1px solid #1a3a1a", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
            <div style={{ fontFamily:S.bebas, fontSize:16, letterSpacing:3, color:"#4ade80" }}>
              {"💰 RECENT DONATIONS "}{donationLog.length > 0 && <span style={{ color:"#2a5a3a", fontSize:13 }}>{"(" + donationLog.length + ")"}</span>}
            </div>
            <div style={{ fontFamily:S.barlow, fontSize:12, color:"#2a4a2a", fontStyle:"italic" }}>Live via Streamlabs</div>
          </div>
          {donationLog.length === 0 ? (
            <div style={{ padding:"20px 18px", fontFamily:S.barlow, fontSize:14, color:"#2a4a2a", fontStyle:"italic", textAlign:"center" }}>
              No donations yet this session. Donations will appear here in real time.
            </div>
          ) : (
            <div style={{ maxHeight:280, overflowY:"auto" }}>
              {donationLog.map((d, i) => (
                <div key={d.id} style={{ display:"flex", alignItems:"center", gap:12, padding:"10px 18px", borderBottom:"1px solid #0d1a0d", background: i===0 ? "#0a200a" : "transparent", transition:"background 0.3s" }}>
                  <div style={{ fontFamily:S.bebas, fontSize:20, color:"#4ade80", minWidth:64, letterSpacing:1 }}>${d.amount.toFixed(2)}</div>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontFamily:S.barlow, fontSize:15, color:"#c8e6c8", fontWeight:600 }}>{d.donor}</div>
                    {d.message && <div style={{ fontFamily:S.barlow, fontSize:13, color:"#6a9e6a", fontStyle:"italic", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>"{d.message}"</div>}
                  </div>
                  <div style={{ fontFamily:S.barlow, fontSize:12, color:"#2a4a2a", flexShrink:0, textAlign:"right" }}>
                    <div>{d.receivedDate}</div>
                    <div>{d.receivedAt}</div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>

      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
