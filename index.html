    // ── Admin password check via Supabase admin_config table ─────────────────
    // The hash is stored server-side in Supabase and set via SQL editor only.
    // Nobody can change it through the browser. No localStorage involved.

    function _sha256hex(str, cb) {
      crypto.subtle.digest("SHA-256", new TextEncoder().encode(str))
        .then(function(buf) {
          var hex = Array.from(new Uint8Array(buf)).map(function(b){ return b.toString(16).padStart(2,"0"); }).join("");
          cb(null, hex);
        })
        .catch(function(e){ cb(e, null); });
    }

    // checkAdminPassword(attempt, callback(isMatch))
    // Calls Edge Function which does the hash comparison server-side.
    // The hash never leaves Supabase — only true/false is returned.
    window.checkAdminPassword = function(attempt, cb) {
      fetch("https://qygxzevrxgbbnkqwpofx.supabase.co/functions/v1/hyper-handler", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ attempt: attempt.trim() })
      })
      .then(function(r) { return r.json(); })
      .then(function(d) { cb(d && d.ok === true); })
      .catch(function() { cb(false); });
    };

    // setAdminPassword is no longer used — password is set via Supabase SQL editor
    window.setAdminPassword = function(newPw, cb) { cb(true); };

  <script>
    // ── Supabase config ──────────────────────────────────────────────────────
    var SUPABASE_URL  = "https://qygxzevrxgbbnkqwpofx.supabase.co";
    var SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF5Z3h6ZXZyeGdiYm5rcXdwb2Z4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNTg3MzIsImV4cCI6MjA5MDgzNDczMn0.s7ORhMpz-XuiRtDsP99UZSCDnpyshGhcVDOfny8Idq4";
    var SUPABASE_STATE_KEY = "tracker_state";

    // ── Supabase helpers (plain fetch, no SDK needed for simple ops) ─────────
    function _sbHeaders(write) {
      var h = { "apikey": SUPABASE_ANON, "Authorization": "Bearer " + SUPABASE_ANON, "Content-Type": "application/json" };
      if (write) h["Prefer"] = "resolution=merge-duplicates";
      return h;
    }

    // Load the tracker state from Supabase
    window._loadPublishedState = function(onSuccess, onError) {
      fetch(SUPABASE_URL + "/rest/v1/tracker_state?key=eq." + SUPABASE_STATE_KEY + "&select=value", {
        headers: _sbHeaders(false)
      })
      .then(function(r) { return r.json(); })
      .then(function(rows) {
        if (rows && rows.length > 0 && rows[0].value) {
          onSuccess(rows[0].value);
        } else {
          onError("No state in Supabase yet");
        }
      })
      .catch(function(e) { onError(e.message); });
    };

    // Publish (upsert) the tracker state to Supabase
    window._publishState = function(payload, onSuccess, onError) {
      fetch(SUPABASE_URL + "/rest/v1/tracker_state", {
        method: "POST",
        headers: _sbHeaders(true),
        body: JSON.stringify({ key: SUPABASE_STATE_KEY, value: payload, updated_at: new Date().toISOString() })
      })
      .then(function(r) {
        if (r.ok || r.status === 201 || r.status === 200) { onSuccess(); }
        else { r.text().then(function(t) { onError(t); }); }
      })
      .catch(function(e) { onError(e.message); });
    };

    // Fetch static data (history/videos/game library) from Supabase
    window._fetchStaticData = function(key, cb) {
      fetch(SUPABASE_URL + "/rest/v1/static_data?key=eq." + encodeURIComponent(key) + "&select=value", {
        headers: { "apikey": SUPABASE_ANON, "Authorization": "Bearer " + SUPABASE_ANON }
      })
      .then(function(r) { return r.json(); })
      .then(function(rows) {
        if (rows && rows.length > 0) cb(null, rows[0].value);
        else cb(new Error("Not found: " + key), null);
      })
      .catch(function(e) { cb(e, null); });
    };

    // Subscribe to realtime changes on tracker_state
    window._subscribeState = function(onUpdate) {
      // Use Supabase realtime via websocket
      // We'll poll every 5s as a fallback if realtime isn't available
      var lastUpdated = null;
      var interval = setInterval(function() {
        fetch(SUPABASE_URL + "/rest/v1/tracker_state?key=eq." + SUPABASE_STATE_KEY + "&select=value,updated_at", {
          headers: _sbHeaders(false)
        })
        .then(function(r) { return r.json(); })
        .then(function(rows) {
          if (rows && rows.length > 0) {
            var ts = rows[0].updated_at;
            if (ts && ts !== lastUpdated) {
              lastUpdated = ts;
              onUpdate(rows[0].value);
            }
          }
        })
        .catch(function() {});
      }, 5000);
      return function() { clearInterval(interval); };
    };

function Triforce({ size, color, opacity }) {
  const s = size || 24;
  const c = color || "#facc15";
  const o = opacity !== undefined ? opacity : 1;
  return (
    <svg width={s} height={s} viewBox="0 0 100 87" style={{ opacity: o }}>
      <polygon points="50,0 100,87 0,87" fill="none" stroke={c} strokeWidth="4" />
      <polygon points="50,0 75,43 25,43" fill={c} opacity="0.9" />
      <polygon points="25,43 50,87 0,87" fill={c} opacity="0.9" />
      <polygon points="75,43 100,87 50,87" fill={c} opacity="0.9" />
    </svg>
  );
}

function CornerOrnaments({ color }) {
  const c = color || "#facc1544";
  const base = { position:"absolute", width:10, height:10, borderColor:c, borderStyle:"solid" };
  return (
    <div>
      <div style={Object.assign({}, base, { top:6, left:6,  borderWidth:"2px 0 0 2px" })} />
      <div style={Object.assign({}, base, { top:6, right:6, borderWidth:"2px 2px 0 0" })} />
      <div style={Object.assign({}, base, { bottom:6, left:6,  borderWidth:"0 0 2px 2px" })} />
      <div style={Object.assign({}, base, { bottom:6, right:6, borderWidth:"0 2px 2px 0" })} />
    </div>
  );
}

// ── Modal ──────────────────────────────────────────────────────────────────
function Modal({ request, onSave, onClose, allRequests }) {
  const tier = getTierOrNone(request.tierName);
  const [title, setTitle]           = useState(request.title || "");
  const [requester, setReq]         = useState(request.requester || "");
  const [details, setDetails]       = useState(request.details || "");
  const [donationDate, setDonationDate] = useState(request.donationDate || request.receivedDate || "");
  const [donationTime, setDonationTime] = useState(request.donationTime || request.receivedAt || "");
  const [playDate, setPlayDate]     = useState(request.date || "");
  const [playTime, setPlayTime]     = useState(request.time || "");
  const [amount, setAmount]         = useState(request.amount != null ? String(request.amount) : "");
  const [segments, setSegments]     = useState(request.segments || []);
  const [newName, setNewName]   = useState("");
  const [newAmt, setNewAmt]     = useState("");
  const [newColor, setNewColor] = useState(CONTRIB_COLORS[0]);
  const [cap, setCap]           = useState(request.cap || tier.price);
  const [editingCap, setEditingCap] = useState(false);
  const [capInput, setCapInput]     = useState(String(request.cap || tier.price));

  const funded    = segments.reduce((a, s) => a + Number(s.amount), 0);
  const remaining = Math.max(0, cap - funded);
  const segPct    = Math.min((funded / cap) * 100, 100);
  const isFull    = funded >= cap;

  const addSeg = () => {
    const amt = parseFloat(newAmt);
    if (isNaN(amt) || amt <= 0) return;
    const name = newName.trim() || "Anonymous";
    setSegments(s => [...s, { name, amount: amt, color: newColor }]);
    // Auto-advance to next color
    const nextIdx = (CONTRIB_COLORS.indexOf(newColor) + 1) % CONTRIB_COLORS.length;
    setNewColor(CONTRIB_COLORS[nextIdx]);
    setNewName(""); setNewAmt("");
  };

  const saveCap = () => {
    const v = parseFloat(capInput);
    if (!isNaN(v) && v > 0) setCap(v);
    else setCapInput(String(cap));
    setEditingCap(false);
  };

  const inp = { width:"100%", background:"#060e06", border:"1px solid #2a4a2a", borderRadius:3, padding:"9px 12px", color:"#c8e6c8", fontFamily:S.barlow, fontSize:16, outline:"none" };
  const lbl = { fontFamily:S.barlow, fontSize:13, letterSpacing:3, color:"#6b8f6b", display:"block", marginBottom:5 };

  let titleLabel = "GAME / TITLE";
  if (tier.name === "WHEEL") titleLabel = "WHEEL ITEM";
  if (tier.name === "ZOOTR6") titleLabel = "GAME / RANDOMIZER TYPE";

  let titlePlaceholder = "e.g. Elden Ring";
  if (tier.name === "VERSUS") titlePlaceholder = "e.g. 1v1 Mario Kart";
  if (tier.name === "ZOOTR6") titlePlaceholder = "e.g. Pokemon Randomizer Nuzlocke";
  if (tier.name === "WHEEL") titlePlaceholder = "e.g. Spin the Wheel";

  // Unfunded requests of same tier (excluding this one)
  const unfundedOptions = (allRequests || []).filter(r =>
    r.id !== request.id &&
    r.tierName === request.tierName &&
    !r.completed &&
    tier.canSegment
  ).map(r => {
    const f = (r.segments || []).reduce((a, s) => a + Number(s.amount), 0);
    const c = r.cap || tier.price;
    return { ...r, funded: f, cap: c, pctFunded: Math.round((f/c)*100) };
  });

  const [showExisting, setShowExisting] = useState(false);

  return (
    <div
      style={{ position:"fixed", inset:0, background:"rgba(5,15,5,0.93)", zIndex:1000, display:"flex", alignItems:"center", justifyContent:"center", padding:16, overflowY:"auto" }}>
      <div style={{ background:"linear-gradient(160deg,#0d1f0d,#091409)", border:"1px solid " + tier.color + "66", borderRadius:4, padding:26, width:"100%", maxWidth:500, boxShadow:"0 0 60px " + tier.glow + ", inset 0 0 40px rgba(0,0,0,0.5)", position:"relative", outline:"1px solid #2a4a2a", outlineOffset:4 }}>
        <CornerOrnaments color={tier.color + "88"} />
        <div style={{ display:"flex", alignItems:"center", gap:14, marginBottom:20 }}>
          <div style={{ width:42, height:42, borderRadius:"50%", background:tier.color + "22", border:"1px solid " + tier.color + "66", display:"flex", alignItems:"center", justifyContent:"center", fontSize:23 }}>{tier.emoji}</div>
          <div>
            <div style={{ fontFamily:S.bebas, fontSize:20, color:tier.color, textShadow:"0 0 12px " + tier.color }}>{tier.zelda}</div>
            <div style={{ fontFamily:S.barlow, fontSize:14, color:"#6b8f6b", letterSpacing:2 }}>{fmt(tier.price)} RUPEES</div>
          </div>
          <button onClick={onClose} style={{ marginLeft:"auto", background:"none", border:"none", color:"#6b8f6b", fontSize:23, cursor:"pointer" }}>X</button>
        </div>

        <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
          <div>
            <label style={lbl}>{titleLabel}</label>
            <input value={title} onChange={e => setTitle(e.target.value)} placeholder={titlePlaceholder} style={inp} />
          </div>
          <div>
            <label style={lbl}>REQUESTED BY</label>
            <input value={requester} onChange={e => setReq(e.target.value)} placeholder="e.g. SurfClay" style={inp} />
          </div>
          <div>
            <label style={lbl}>QUEST DETAILS / NOTES</label>
            <textarea value={details} onChange={e => setDetails(e.target.value)} placeholder="Any extra details, rules, or notes..." rows={2}
              style={Object.assign({}, inp, { resize:"vertical", colorScheme:"dark" })} />
          </div>
          <div style={{ background:"#060e06", border:"1px solid #1a3a1a", borderRadius:3, padding:"10px 12px", display:"flex", flexDirection:"column", gap:8 }}>
            <div style={{ fontFamily:S.bebas, fontSize:11, letterSpacing:3, color:"#4a6a4a", marginBottom:2 }}>DONATION MADE</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
              <div>
                <label style={lbl}>DATE RECEIVED</label>
                <input type="date" value={donationDate} onChange={e => setDonationDate(e.target.value)} style={Object.assign({}, inp, { colorScheme:"dark" })} />
              </div>
              <div>
                <label style={lbl}>TIME RECEIVED</label>
                <input type="time" value={donationTime} onChange={e => setDonationTime(e.target.value)} style={Object.assign({}, inp, { colorScheme:"dark" })} />
              </div>
            </div>
            <div>
              <label style={lbl}>DONATION AMOUNT</label>
              <input type="number" min="0" step="1" value={amount} onChange={e => setAmount(e.target.value)} placeholder="e.g. 125" style={inp} />
            </div>
          </div>
          <div style={{ background:"#060e06", border:"1px solid #1a3a1a", borderRadius:3, padding:"10px 12px", display:"flex", flexDirection:"column", gap:8 }}>
            <div style={{ fontFamily:S.bebas, fontSize:11, letterSpacing:3, color:"#4a6a4a", marginBottom:2 }}>{request.completed ? "PLAYED" : "DATE PLAYING"}</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
              <div>
                <label style={lbl}>DATE</label>
                <input type="date" value={playDate} onChange={e => setPlayDate(e.target.value)} style={Object.assign({}, inp, { colorScheme:"dark" })} />
              </div>
              <div>
                <label style={lbl}>TIME</label>
                <input type="time" value={playTime} onChange={e => setPlayTime(e.target.value)} style={Object.assign({}, inp, { colorScheme:"dark" })} />
              </div>
            </div>
          </div>
          {tier.canSegment && (
            <div style={{ borderTop:"1px solid " + tier.color + "33", paddingTop:14, marginTop:2 }}>
              {/* Party funding header with editable cap */}
              <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
                <div style={{ fontFamily:S.bebas, fontSize:14, color:tier.color, letterSpacing:1 }}>PARTY FUNDING</div>
                <div style={{ flex:1, height:1, background:tier.color + "22" }} />
                <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                  {editingCap ? (
                    <>
                      <span style={{ fontFamily:S.barlow, fontSize:13, color:"#6b8f6b" }}>{fmt(funded)} / $</span>
                      <input value={capInput} onChange={e => setCapInput(e.target.value)}
                        onKeyDown={e => { if (e.key === "Enter") saveCap(); if (e.key === "Escape") setEditingCap(false); }}
                        style={{ width:70, background:"#060e06", border:"1px solid " + tier.color + "88", borderRadius:3, padding:"2px 6px", color:tier.color, fontFamily:S.bebas, fontSize:15, outline:"none", textAlign:"center" }}
                        autoFocus />
                      <button onClick={saveCap} style={{ background:tier.color + "22", border:"1px solid " + tier.color + "66", borderRadius:3, color:tier.color, fontFamily:S.bebas, fontSize:12, cursor:"pointer", padding:"2px 8px" }}>OK</button>
                    </>
                  ) : (
                    <>
                      <div style={{ fontFamily:S.barlow, fontSize:15, color: isFull ? "#4ade80" : tier.color }}>{fmt(funded)} / {fmt(cap)}</div>
                      <button onClick={() => { setCapInput(String(cap)); setEditingCap(true); }}
                        title="Edit funding cap"
                        style={{ background:"none", border:"1px solid #2a4a2a", borderRadius:3, color:"#4a6a4a", fontFamily:S.bebas, fontSize:10, cursor:"pointer", padding:"2px 6px", letterSpacing:1 }}>EDIT</button>
                    </>

              <div style={{ height:10, background:"#060e06", borderRadius:2, overflow:"hidden", border:"1px solid #1a3a1a", marginBottom:10, display:"flex" }}>
                {segments.map((s, i) => {
                  const w = Math.min((Number(s.amount) / cap) * 100, 100);
                  const cc = s.color || getCC(i);
                  return (
                    <div key={i} style={{ height:"100%", width:w + "%", background:cc, borderRight: i < segments.length - 1 ? "1px solid #040c04" : "none" }} />

  );

// ── Calendar ───────────────────────────────────────────────────────────────
function Calendar({ requests }) {
  const today = new Date();
  const [viewYear, setViewYear]   = useState(today.getFullYear());
  const [viewMonth, setViewMonth] = useState(today.getMonth());
  const [selected, setSelected]   = useState(null);

  const byDate = {};
  requests.filter(r => r.date).forEach(r => {
    if (!byDate[r.date]) byDate[r.date] = [];
    byDate[r.date].push(r);
  });

  const firstDay    = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < firstDay; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const todayStr = today.getFullYear() + "-" + String(today.getMonth()+1).padStart(2,"0") + "-" + String(today.getDate()).padStart(2,"0");

  const prev = () => { if (viewMonth===0){setViewMonth(11);setViewYear(y=>y-1);}else setViewMonth(m=>m-1); setSelected(null); };
  const next = () => { if (viewMonth===11){setViewMonth(0);setViewYear(y=>y+1);}else setViewMonth(m=>m+1); setSelected(null); };

  return (
    <div style={{ background:"linear-gradient(160deg,#0a1a0a,#060e06)", border:"1px solid #2a4a2a", borderRadius:4, padding:20, marginBottom:16 }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 }}>
        <button onClick={prev} style={{ background:"#0a1a0a", border:"1px solid #2a4a2a", color:"#8fbb8f", width:34, height:34, borderRadius:3, cursor:"pointer", fontSize:21 }}>{"<"}</button>
        <div style={{ textAlign:"center" }}>
          <div style={{ fontFamily:S.bebas, fontSize:23, color:"#facc15", letterSpacing:2 }}>{MONTHS[viewMonth]} {viewYear}</div>
          <div style={{ fontFamily:S.barlow, fontSize:13, color:"#6a9e6a", letterSpacing:4 }}>QUEST CALENDAR</div>
        </div>
        <button onClick={next} style={{ background:"#0a1a0a", border:"1px solid #2a4a2a", color:"#8fbb8f", width:34, height:34, borderRadius:3, cursor:"pointer", fontSize:21 }}>{">"}</button>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:3, marginBottom:4 }}>
        {DAYS.map(d => <div key={d} style={{ textAlign:"center", fontFamily:S.barlow, fontSize:13, color:"#6a9e6a", padding:"4px 0" }}>{d}</div>)}
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:3 }}>
        {cells.map((day, i) => {
          if (!day) return <div key={"e"+i} />;
          const ds = viewYear + "-" + String(viewMonth+1).padStart(2,"0") + "-" + String(day).padStart(2,"0");
          const events = byDate[ds] || [];
          const isToday = ds === todayStr;
          const isSel = selected === ds;
          return (
            <div key={day} onClick={() => { if (events.length) setSelected(isSel ? null : ds); }}
              style={{ minHeight:38, borderRadius:3, padding:"4px 2px", textAlign:"center", position:"relative",
                background: isSel ? "#142814" : isToday ? "#0f200f" : events.length ? "#0c1a0c" : "transparent",
                border: isToday ? "1px solid #facc1544" : isSel ? "1px solid #facc1588" : "1px solid transparent",
                cursor: events.length ? "pointer" : "default" }}>
              <div style={{ fontFamily:S.barlow, fontSize:15, color: isToday ? "#facc15" : events.length ? "#a3d9a3" : "#6a9e6a" }}>{day}</div>
              {events.length > 0 && (
                <div style={{ display:"flex", flexWrap:"wrap", justifyContent:"center", gap:2, marginTop:2 }}>
                  {events.slice(0,3).map((ev, ei) => {
                    const t = TIERS.find(t => t.name === ev.tierName);
                    return <div key={ei} style={{ width:5, height:5, borderRadius:"50%", background: t ? t.color : "#facc15" }} />;
                  })}
                </div>
              )}
            </div>
          );
        })}
      </div>
      {selected && byDate[selected] && (
        <div style={{ marginTop:14, borderTop:"1px solid #1a3a1a", paddingTop:14 }}>
          <div style={{ fontFamily:S.barlow, fontSize:14, letterSpacing:3, color:"#8fbb8f", marginBottom:10 }}>
            {new Date(selected + "T12:00:00").toLocaleDateString("en-US", { weekday:"long", month:"long", day:"numeric" })}
          </div>
          {byDate[selected].map((ev, i) => {
            const t = TIERS.find(t => t.name === ev.tierName);
            const funded = (ev.segments||[]).reduce((a,s) => a + Number(s.amount), 0);
            const sp = t ? Math.min((funded/t.price)*100, 100) : 0;
            return (
              <div key={i} style={{ padding:"10px 14px", background:"#060e06", borderRadius:3, borderLeft:"3px solid " + (t ? t.color : "#fff"), marginBottom:6 }}>
                <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                  <span style={{ fontSize:21 }}>{t ? t.emoji : ""}</span>
                  <div style={{ fontFamily:S.barlow, flex:1 }}>
                    <div style={{ fontSize:17, color:"#c8e6c8", fontWeight:600 }}>{ev.title || (t ? t.zelda : "")}</div>
                    <div style={{ fontSize:14, color:"#8fbb8f", marginTop:3 }}>
                      {ev.requester && <span style={{ color:"#a3d9a3" }}>{"@ " + ev.requester + "  "}</span>}
                      {ev.time && <span>{"T " + ev.time}</span>}
                    </div>
                  </div>
                  <div style={{ fontFamily:S.bebas, fontSize:17, color: t ? t.color : "#fff" }}>{t ? fmt(t.price) : ""}</div>
                </div>
                {t && t.canSegment && (ev.segments||[]).length > 0 && (
                  <div style={{ marginTop:8 }}>
                    <div style={{ height:5, background:"#040c04", borderRadius:2, overflow:"hidden", border:"1px solid #1a3a1a", marginBottom:5, display:"flex" }}>
                      {ev.segments.map((s, si) => {
                        const w = Math.min((Number(s.amount)/t.price)*100, 100);
                        return <div key={si} style={{ height:"100%", width:w + "%", background: s.color || getCC(si) }} />;
                      })}
                    </div>
                    <div style={{ display:"flex", flexWrap:"wrap", gap:5 }}>
                      {ev.segments.map((s, si) => {
                        const cc = s.color || getCC(si);
                        return (
                          <div key={si} style={{ fontFamily:S.barlow, fontSize:14, background:"#0a1a0a", padding:"2px 8px", borderRadius:2, border:"1px solid " + cc + "44", color:cc }}>
                            {s.name} {fmt(s.amount)}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
      {!requests.filter(r => r.date).length && (
        <div style={{ textAlign:"center", padding:"14px 0", fontFamily:S.barlow, color:"#6a9e6a", fontSize:15, fontStyle:"italic" }}>No quests scheduled yet, brave hero...</div>
      )}
    </div>
  );
}

// ── Animated Counter Hook ──────────────────────────────────────────────────
function useAnimatedCounter(target, duration = 1200) {
  const [display, setDisplay] = useState(target);
  const prevRef = useRef(target);
  const rafRef = useRef(null);
  useEffect(() => {
    const from = prevRef.current;
    const to = target;
    if (from === to) return;
    const start = performance.now();
    const tick = (now) => {
      const elapsed = now - start;
      const progress = Math.min(elapsed / duration, 1);
      // easeOutExpo
      const ease = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress);
      setDisplay(Math.round(from + (to - from) * ease));
      if (progress < 1) rafRef.current = requestAnimationFrame(tick);
      else prevRef.current = to;
    };
    rafRef.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(rafRef.current);
  }, [target, duration]);
  return display;
}

}

function useConfirm() {
  const [state, setState] = useState(null); // { message, onConfirm }
  const confirm = (message, onConfirm) => setState({ message, onConfirm });
  const handleConfirm = () => { state.onConfirm(); setState(null); };
  const handleCancel = () => setState(null);
  const modal = state ? <ConfirmModal message={state.message} onConfirm={handleConfirm} onCancel={handleCancel} /> : null;
  return { confirm, modal };
}

// ── Spinning Wheel ──────────────────────────────────────────────────────────
const WHEEL_COLORS = ["#f472b6","#a78bfa","#38bdf8","#fb923c","#34d399","#e879f9","#fbbf24","#60a5fa"];

function SpinningWheel({ requests, onConfirmSpin, isAdmin }) {
  const top8 = requests.slice(0, 8);
  const [rotation, setRotation] = useState(0);
  const [spinning, setSpinning] = useState(false);
  const [winner, setWinner] = useState(null);
  const [winnerIdx, setWinnerIdx] = useState(null);
  const [games, setGames] = useState("");
  const rotRef = useRef(0);

  const spin = () => {
    if (spinning || top8.length < 8) return;
    setWinner(null);
    setWinnerIdx(null);

    const total = top8.length;
    const segAngle = 360 / total;

    // Pick random winner
    const idx = Math.floor(Math.random() * total);

    // Segment i's center sits at (i * segAngle + segAngle/2) degrees from the top when unrotated.
    // After CSS rotate(R deg) clockwise, it lands at (i * segAngle + segAngle/2 + R) % 360 from top.
    // Pointer is at top = 0°. We need: (segCenter + R) % 360 === 0 → R = -segCenter mod 360.
    const segCenter = idx * segAngle + segAngle / 2;
    const targetOffset = ((360 - (segCenter % 360)) % 360);

    // Normalize current rotation to 0-360
    const currentNormalized = ((rotRef.current % 360) + 360) % 360;

    // Degrees to rotate from current position to hit the target
    // Always rotate at least a tiny bit forward
    let delta = (targetOffset - currentNormalized + 360) % 360;
    if (delta < 10) delta += 360; // ensure we spin forward, not just wiggle

    // Tiny jitter within the inner 30% of segment
    const jitter = (Math.random() - 0.5) * segAngle * 0.3;

    // 5–8 full extra rotations for dramatic effect
    const extraSpins = (5 + Math.floor(Math.random() * 4)) * 360;

    const finalRotation = rotRef.current + extraSpins + delta + jitter;

    rotRef.current = finalRotation;
    setRotation(finalRotation);
    setSpinning(true);

    setTimeout(() => {
      setSpinning(false);
      setWinner(top8[idx]);
      setWinnerIdx(idx);
    }, 4000);
  };

  const inp = { background:"#060e06", border:"1px solid #2a1a2a", borderRadius:3, padding:"7px 10px", color:"#c8e6c8", fontFamily:"Barlow, sans-serif", fontSize:17, outline:"none", width:"100%", boxSizing:"border-box" };

  return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:14 }}>

      {/* Wheel SVG */}
      <div style={{ position:"relative", width:260, height:260 }}>
        {/* Pointer */}
        <div style={{ position:"absolute", top:-8, left:"50%", transform:"translateX(-50%)", zIndex:10, width:0, height:0, borderLeft:"10px solid transparent", borderRight:"10px solid transparent", borderTop:"22px solid #facc15", filter:"drop-shadow(0 0 6px #facc15aa)" }} />

        {/* Spinning wheel */}
        <svg width="260" height="260" viewBox="0 0 260 260"
          style={{ position:"absolute", top:0, left:0, transform:`rotate(${rotation}deg)`, transition: spinning ? "transform 4s cubic-bezier(0.17,0.67,0.12,0.99)" : "none" }}>
          {top8.map((req, i) => {
            const total = top8.length;
            const angleStep = (2 * Math.PI) / total;
            const startAngle = i * angleStep - Math.PI / 2;
            const endAngle = startAngle + angleStep;
            const r = 120, cx = 130, cy = 130;
            const x1 = cx + r * Math.cos(startAngle);
            const y1 = cy + r * Math.sin(startAngle);
            const x2 = cx + r * Math.cos(endAngle);
            const y2 = cy + r * Math.sin(endAngle);
            const largeArc = angleStep > Math.PI ? 1 : 0;
            const midAngle = startAngle + angleStep / 2;
            const labelR = 78;
            const lx = cx + labelR * Math.cos(midAngle);
            const ly = cy + labelR * Math.sin(midAngle);
            const shortName = req.name.length > 11 ? req.name.slice(0, 10) + "…" : req.name;
            const col = WHEEL_COLORS[i % WHEEL_COLORS.length];
            return (
              <g key={req.id}>
                <path d={`M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${largeArc},1 ${x2},${y2} Z`}
                  fill={col + "33"} stroke={col} strokeWidth="2" />
                <text x={lx} y={ly} textAnchor="middle" dominantBaseline="middle"
                  fill={col} fontSize="10" fontFamily="Barlow, sans-serif" fontWeight="700"
                  transform={`rotate(${midAngle * 180 / Math.PI + 90}, ${lx}, ${ly})`}>
                  {shortName}
                </text>
              </g>
            );
          })}
          <circle cx="130" cy="130" r="20" fill="#0a1a0a" stroke="#f472b688" strokeWidth="2" />
          <text x="130" y="134" textAnchor="middle" dominantBaseline="middle" fill="#f472b6" fontSize="16" fontFamily="Bebas Neue, sans-serif">GO</text>
        </svg>

        {/* Static winner highlight overlay — always at top (pointer position) */}
        {winner && winnerIdx !== null && (() => {
          const total = top8.length;
          const segAngle = (2 * Math.PI) / total;
          // After spinning, the winner segment is centered at the top (-π/2).
          // Draw the highlight centered at -π/2 with width = one segment.
          const midAngle = -Math.PI / 2;
          const startAngle = midAngle - segAngle / 2;
          const endAngle = midAngle + segAngle / 2;
          const r = 120, cx = 130, cy = 130;
          const x1 = cx + r * Math.cos(startAngle);
          const y1 = cy + r * Math.sin(startAngle);
          const x2 = cx + r * Math.cos(endAngle);
          const y2 = cy + r * Math.sin(endAngle);
          const largeArc = segAngle > Math.PI ? 1 : 0;
          const col = WHEEL_COLORS[winnerIdx % WHEEL_COLORS.length];
          return (
            <svg width="260" height="260" viewBox="0 0 260 260"
              style={{ position:"absolute", top:0, left:0, pointerEvents:"none" }}>
              <path d={`M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${largeArc},1 ${x2},${y2} Z`}
                fill={col + "66"}
                stroke={col}
                strokeWidth="3"
                style={{ filter:`drop-shadow(0 0 14px ${col}) drop-shadow(0 0 6px ${col})` }}
              />
            </svg>
          );
        })()}
      </div>

      {/* Spin button */}
      {!winner && isAdmin && (
        <button onClick={spin} disabled={spinning}
          style={{ fontFamily:"Bebas Neue, sans-serif", fontSize:22, letterSpacing:3, padding:"12px 36px", borderRadius:4, background: spinning ? "#0a1a0a" : "linear-gradient(135deg,#f472b6,#a78bfa)", border:"none", color:"#fff", cursor: spinning ? "not-allowed" : "pointer", boxShadow: spinning ? "none" : "0 0 24px #f472b666", transition:"all 0.3s", opacity: spinning ? 0.6 : 1 }}>
          {spinning ? "SPINNING..." : "🎡 SPIN THE WHEEL"}
        </button>
      )}
      {!winner && !isAdmin && (
        <div style={{ fontFamily:"Bebas Neue, sans-serif", fontSize:14, letterSpacing:3, color:"#2a4a2a", padding:"12px 0" }}>
          {"🔒 ADMIN ONLY"}
        </div>
      )}

      {/* Winner reveal */}
      {winner && !spinning && (
        <div style={{ background:"#002a10", border:"2px solid #22dd66", borderRadius:6, padding:"16px 20px", textAlign:"center", width:"100%", animation:"rupeePop 0.4s cubic-bezier(.34,1.56,.64,1)" }}>
          <div style={{ fontFamily:"Bebas Neue, sans-serif", fontSize:14, letterSpacing:3, color:"#22dd66", marginBottom:6 }}>🏆 WINNER!</div>
          <div style={{ fontFamily:"Barlow, sans-serif", fontSize:20, color:"#fff", fontWeight:700, marginBottom:12 }}>{winner.name}</div>
          <input value={games} onChange={e => setGames(e.target.value)}
            placeholder="Add a note (optional)..." style={Object.assign({}, inp, { marginBottom:10 })} />
          <div style={{ display:"flex", gap:8 }}>
            {isAdmin && (
              <button onClick={() => { onConfirmSpin(winner.id, games.trim()); setWinner(null); setGames(""); }}
                style={{ flex:1, fontFamily:"Bebas Neue, sans-serif", fontSize:18, letterSpacing:2, padding:"9px", borderRadius:3, background:"#002a10", border:"1px solid #22dd6688", color:"#22dd66", cursor:"pointer" }}>
                {"✓ CONFIRM"}
              </button>
            )}
            {isAdmin && (
              <button onClick={() => { setWinner(null); }}
                style={{ fontFamily:"Bebas Neue, sans-serif", fontSize:18, letterSpacing:2, padding:"9px 16px", borderRadius:3, background:"#1a0a0a", border:"1px solid #f8717144", color:"#f87171", cursor:"pointer" }}>
                {"↺ RESPIN"}
              </button>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ── Stats Panel ─────────────────────────────────────────────────────────────
function StatsPanel({ historyRows }) {
// Gather all rows from all subathons
const allRows = ["Subathon #1","Subathon #2","Subathon #3"].flatMap(e => historyRows[e] || []);
const nonBanner = allRows.filter(r => r.type !== "event_banner" && r.type !== "event_subheader");

// Top 50 games — count all non-banner entries, normalize names by stripping tracking noise
const gameCounts = {};
const normalizeGame = (name) => {
  let n = (name || "");
  // Strip platform tags: (Steam), (Switch), (PC), (N64), (GC), (Wii), (GBA), (GBC), (SNES), etc.
  n = n.replace(/\s*[\(\[](steam|switch|pc|n64|gc|wii u?|wii|gba|gbc|snes|emu[^\)\]]*|emulator[^\)\]]*|upscaled?[^\)\]]*|google play|on switch|on pc)[^\)\]]*[\)\]]/gi, "");
  // Strip session/request tracking: (session 1 of 2), (request 1 of 2), (1 of 2), (s1 of 2)
  n = n.replace(/\s*[\(\[](sessions?\s*\d[^\)\]]*|\d+\s*of\s*\d+|s\d+\s*of\s*\d+|request\s*\d[^\)\]]*)[^\)\]]*[\)\]]/gi, "");
  // Strip donor/event notes in parens that aren't part of the game title
  n = n.replace(/\s*[\(\[](giveaway winner|gifted by[^\)]*|mod appreciation[^\)]*|forced console[^\)]*|custom wheel[^\)]*|redeemed[^\)]*|bonus session|also participating[^\)]*|practice for[^\)]*|emulator issues[^\)]*|replayed later[^\)]*|seed finished[^\)]*|last one[^\)]*|fr this time[^\)]*|counting this as[^\)]*|close to finishing[^\)]*|very close[^\)]*|final session[^\)]*|not being uploaded[^\)]*|mucking about[^\)]*)[^\)\]]*[\)\]]/gi, "");
  // Strip recording/blind/upscale descriptors
  n = n.replace(/\s*(recording lp episodes|blind playthrough|blind|upscale version on pc)/gi, "");
  // Strip trailing/leading parens that are now empty: "()" or "( )"
  n = n.replace(/\s*[\(\[]\s*[\)\]]/g, "");
  // Strip trailing dash/punctuation
  n = n.replace(/\s*[-–—]\s*$/, "");
  return n.trim();
};
nonBanner.filter(r => r.type !== "planned" && r.type !== "reaction" && r.type !== "wheel").forEach(r => {
  const key = normalizeGame(r.task);
  if (key) gameCounts[key] = (gameCounts[key]||0) + 1;
});
const topGames = Object.entries(gameCounts).sort((a,b) => b[1]-a[1]).slice(0,50);
const maxGame = (topGames[0] && topGames[0][1]) || 1;

// Top 50 donators
const donatorCounts = {};
const EXCLUDE = new Set(["planned segment","daily","weekly","unplanned","itsthattwink","random wheel spin",""]);
nonBanner.forEach(r => {
  const d = (r.donator||"").trim();
  const clean = d.replace(/\s*[\[(].*?[\])]|\s*\(.*?\)/g,"").trim();
  if (!clean || EXCLUDE.has(clean.toLowerCase())) return;
  donatorCounts[clean] = (donatorCounts[clean]||0) + 1;
});
const topDonators = Object.entries(donatorCounts).sort((a,b) => b[1]-a[1]).slice(0,50);
const maxDon = (topDonators[0] && topDonators[0][1]) || 1;

// Type counts for bar chart
const typeTotals = {};
ROW_TYPES.forEach(t => { typeTotals[t.id] = nonBanner.filter(r => r.type === t.id).length; });
const maxType = Math.max(...Object.values(typeTotals), 1);

const medalColor = i => i === 0 ? "#facc15" : i === 1 ? "#a0a0b8" : i === 2 ? "#c87820" : "#4a6a4a";

return (
  <div>

    <div style={{ background:"#0a1a0a", border:"1px solid #1a3a1a", borderRadius:4, padding:"20px 22px", marginBottom:16 }}>
      <div style={{ fontFamily:S.bebas, fontSize:18, letterSpacing:3, color:"#a78bfa", marginBottom:16 }}>{"ENTRIES BY TYPE — ALL SUBATHONS"}</div>
      <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
        {ROW_TYPES.filter(t => typeTotals[t.id] > 0).map(t => (
          <div key={t.id}>
            <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
              <span style={{ fontFamily:S.barlow, fontSize:15, color:t.text }}>{t.label}</span>
              <span style={{ fontFamily:S.bebas, fontSize:15, color:t.text, letterSpacing:1 }}>{typeTotals[t.id]}</span>
            </div>
            <div style={{ height:8, background:"#0d0d0d", borderRadius:4, overflow:"hidden" }}>
              <div style={{ height:"100%", width:((typeTotals[t.id]/maxType)*100)+"%", background:t.border, borderRadius:4, transition:"width 0.6s" }} />
            </div>
          </div>
        ))}
      </div>
      <div style={{ fontFamily:S.barlow, fontSize:13, color:"#4a6a4a", marginTop:10, fontStyle:"italic" }}>
        {nonBanner.length} total entries across all subathons
      </div>
    </div>

    {/* Two-column leaderboards */}
    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>

      {/* Top 50 Games */}
      <div style={{ background:"#0a1a0a", border:"1px solid #1a3a1a", borderRadius:4, padding:"18px 20px" }}>

              <div style={{ flex:1, minWidth:0 }}>

        </div>

                      style={{ padding:"5px 14px", borderRadius:3, border:"1px solid " + (req.completed ? "#3a8a5a" : "#2a4a2a"), background: req.completed ? "#0a2018" : "none", color: req.completed ? "#7adba0" : "#6a9e6a", fontFamily:"Bebas Neue, sans-serif", fontSize:15, letterSpacing:1, cursor:"pointer", whiteSpace:"nowrap" }}>
                      {req.completed ? "COMPLETED" : "Mark Complete"}
                    </button>
                  </>
                )}
                {!isAdmin && req.completed && (
                  <span style={{ fontFamily:"Bebas Neue, sans-serif", fontSize:13, color:"#7adba0", letterSpacing:1 }}>{"✓ COMPLETE"}</span>
                )}
              </div>
              {/* Inline edit form */}
              {isEditing && (
                <div style={{ padding:"12px 14px", borderTop:"1px solid " + tier.color + "33", display:"flex", flexDirection:"column", gap:10 }}>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                    <div>
                      <label style={lbl}>LENGTH PLAYED</label>
                      <input value={form.length} onChange={e => setForm(f => Object.assign({}, f, { length: e.target.value }))} placeholder="e.g. 2h 15m" style={inp} />
                    </div>
                    <div>
                      <label style={lbl}>DAY</label>
                      <input value={form.day} onChange={e => setForm(f => Object.assign({}, f, { day: e.target.value }))} placeholder="e.g. Day 3" style={inp} />
                    </div>
                  </div>
                  <div>
                    <label style={lbl}>YOUTUBE LINKS</label>
                    {form.links.map((l, li) => (
                      <div key={li} style={{ display:"flex", gap:8, marginBottom:6 }}>
                        <input value={l} onChange={e => setForm(f => Object.assign({}, f, { links: f.links.map((x, i) => i === li ? e.target.value : x) }))}
                          placeholder={"URL " + (li + 1)} style={inp} />
                        {form.links.length > 1 && (
                          <button onClick={() => setForm(f => Object.assign({}, f, { links: f.links.filter((_, i) => i !== li) }))}
                            style={{ background:"none", border:"1px solid #3a2a2a", borderRadius:3, color:"#804040", cursor:"pointer", padding:"0 10px", flexShrink:0 }}>X</button>
                        )}
                      </div>
                    ))}
                    <button onClick={() => setForm(f => Object.assign({}, f, { links: [...f.links, ""] }))}
                      style={{ background:"none", border:"1px solid #2a4a2a", borderRadius:3, color:"#6a9e6a", cursor:"pointer", padding:"5px 12px", fontFamily:"Barlow, sans-serif", fontSize:13 }}>+ Add Link</button>
                  </div>
                  <button onClick={() => saveEdit(req)}
                    style={{ padding:"9px 0", borderRadius:3, border:"1px solid " + tier.color + "88", background: tier.color + "22", color: tier.color, fontFamily:"Bebas Neue, sans-serif", fontSize:15, letterSpacing:2, cursor:"pointer" }}>
                    SAVE
                  </button>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function HistoryTab({ requests, setRequests, historyRows, setHistoryRows, histSort, setHistSort, addRowOpen, setAddRowOpen, newRow, setNewRow, searchGame, setSearchGame, searchDonator, setSearchDonator, isAdmin, pushUndo }) {
  const [historyLoaded, setHistoryLoaded] = React.useState(false);
  const [historyLoading, setHistoryLoading] = React.useState(false);

  React.useEffect(() => {
    if (historyLoaded || historyLoading) return;
    // Check if we already have data (loaded from Supabase tracker_state)
    const hasData = Object.values(historyRows).some(arr => arr && arr.length > 0);
    if (hasData) { setHistoryLoaded(true); return; }

    setHistoryLoading(true);
    // Fetch event list first, then each event
    window._fetchStaticData('history_event_list', function(err, events) {
      if (err || !events) { setHistoryLoading(false); setHistoryLoaded(true); return; }
      var loaded = {};
      var remaining = events.length;
      events.forEach(function(ev) {
        var key = 'history_' + ev.replace(/[^a-z0-9]/gi,'_').toLowerCase();
        window._fetchStaticData(key, function(e2, rows) {
          if (!e2 && rows) loaded[ev] = rows;
          remaining--;
          if (remaining === 0) {
            setHistoryRows(function(h) {
              var merged = Object.assign({}, h);
              Object.keys(loaded).forEach(function(ev2) {
                var defaults = (h[ev2] || []).filter(function(r) { return r.type === 'event_banner' || r.type === 'event_subheader'; });
                var stored   = loaded[ev2].filter(function(r) { return r.type !== 'event_banner' && r.type !== 'event_subheader'; });
                var storedIds = new Set(stored.map(function(r) { return r.id; }));
                var newBanners = defaults.filter(function(r) { return !storedIds.has(r.id); });
                merged[ev2] = newBanners.concat(stored).sort(function(a,b){ return a.id - b.id; });
              });
              return merged;
            });
            setHistoryLoaded(true);
            setHistoryLoading(false);
          }
        });
      });
    });
  }, []);
  const activeEvent = histSort.event;
  const isGiveaways = activeEvent === "Giveaways";
  const isVideos = activeEvent === "Videos";
  const isStats = activeEvent === "Stats";
  const [hiddenTypes, setHiddenTypes] = useState([]);
  const [statsOpen, setStatsOpen] = useState(false);
  const { confirm: confirmDelete, modal: confirmModal } = useConfirm();
  const toggleType = (typeId) => setHiddenTypes(h => h.includes(typeId) ? h.filter(x => x !== typeId) : [...h, typeId]);

  const buildDone = requests.filter(r => r.completed).map(r => {
    const tier = TIERS.find(t => t.name === r.tierName);
    return { id:"req_"+r.id, date:r.date||"", task:r.title||(tier&&tier.zelda)||"", type:"donation", donator:r.requester||"", length:r.histLength||"", day:r.histDay||"", links:r.histLinks||[], fromRequest:true, completed:true, tierName:r.tierName };
  });
  const buildPending = requests.filter(r => !r.completed && r.tierName !== "WHEEL").map(r => {
    const tier = TIERS.find(t => t.name === r.tierName);
    return { id:"req_inc_"+r.id, date:"", task:r.title||(tier&&tier.zelda)||"", type:"donation", donator:r.requester||"", length:"", day:"", links:[], fromRequest:true, completed:false, tierName:r.tierName };
  });

  const getRaw = (ev) => {
    if (ev === "Versus Build-a-thon") return [...buildDone, ...buildPending];
    if (ev === "Videos") {
      // Lazy-load video data if empty
      if (VIDEO_DATA.length === 0 && !window._videoLoading) {
        window._videoLoading = true;
        window._fetchStaticData('video_data', function(err, data) {
          window._videoLoading = false;
          if (!err && data) {
            // Splice into the array in place so references update
            VIDEO_DATA.length = 0;
            data.forEach(function(d) { VIDEO_DATA.push(d); });
            // Force a re-render
            setHistSort(function(s) { return Object.assign({}, s); });
          }
        });
      }
      return VIDEO_DATA;
    }
    if (ev === "All") {
      const subRows = ["Subathon #1","Subathon #2","Subathon #3"].flatMap(e => (historyRows[e] || []).map(r => Object.assign({}, r, { _event: e })));
      return [...subRows, ...buildDone, ...buildPending];
    }
    return (historyRows[ev] || []);
  };

  // Build a date→day lookup from rows that have a day field
  const dateToDayMap = {};
  getRaw(activeEvent).forEach(row => {
    if (row.day && row.day.trim() && row.date) {
      const cleaned = row.day.replace(/\s*(begins|begin|start|starts)[^]*/i, "").trim();
      if (cleaned) dateToDayMap[row.date] = cleaned;
    }
  });

  const sorted = [...getRaw(activeEvent)]
    .filter(row => {
      if (hiddenTypes.length > 0 && hiddenTypes.includes(row.type)) return false;
      if (row.type === "event_banner" || row.type === "event_subheader") return true;
      if (searchGame && !(row.task||"").toLowerCase().includes(searchGame.toLowerCase())) return false;
      if (searchDonator) {
        const d = (row.donator||"").toLowerCase();
        const w = (row.winners||"").toLowerCase();
        const q = searchDonator.toLowerCase();
        if (!d.includes(q) && !w.includes(q)) return false;
      }
      return true;
    })
    .sort((a, b) => {
      const col = histSort.col, dir = histSort.dir;
      let av = a[col] || "", bv = b[col] || "";
      if (col === "date") { av = new Date(av||0); bv = new Date(bv||0); }
      if (av < bv) return dir === "asc" ? -1 : 1;
      if (av > bv) return dir === "asc" ? 1 : -1;
      return 0;
    });

  // ── Stats computation ──────────────────────────────────────────────────
  const statsRows = getRaw(activeEvent).filter(r => r.type !== "event_banner" && r.type !== "event_subheader");
  const typeCounts = {};
  ROW_TYPES.forEach(t => { typeCounts[t.id] = 0; });
  statsRows.forEach(r => { if (typeCounts[r.type] !== undefined) typeCounts[r.type]++; });

  const donatorMap = {};
  statsRows.forEach(r => {
    const d = (r.donator||"").trim();
    if (!d || d === "Planned Segment" || d === "Daily" || d === "Weekly" || d === "Unplanned" || d.toLowerCase() === "itsthattwink") return;
    // strip session notes like "(session 1 of 2)", "(Giveaway Winner)", etc
    const clean = d.replace(/\s*[\[(].*?[\])]|\s*\(.*?\)/g, "").trim();
    if (!clean) return;
    donatorMap[clean] = (donatorMap[clean] || 0) + 1;
  });
  const topDonators = Object.entries(donatorMap)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 10);

  const COLS = isGiveaways
    ? [{id:"date",label:"Date"},{id:"task",label:"Giveaway"},{id:"winners",label:"Winner(s)"}]
    : isVideos
    ? [{id:"date",label:"Publish Date"},{id:"task",label:"Title"},{id:"length",label:"Duration"}]
    : [
        ...(activeEvent === "All" ? [{id:"_event",label:"Event"}] : []),
        {id:"date",label:"Date"},{id:"task",label:"Game/Event"},{id:"donator",label:"Donator / Sponsor"},
        {id:"length",label:"Length Played"},{id:"day",label:"Day"},{id:"links",label:"YouTube Link"}
      ];

  const toggleSort = (col) => setHistSort(s => ({ ...s, col, dir: s.col===col && s.dir==="asc" ? "desc" : "asc" }));

  const submitRow = () => {
    if (!newRow.task.trim()) return;
    pushUndo && pushUndo("Add event row");
    const row = Object.assign({}, newRow, { id: Date.now(), links: newRow.links.filter(l => l.trim()) });
    setHistoryRows(h => Object.assign({}, h, { [addRowOpen]: [...(h[addRowOpen]||[]), row] }));
    setNewRow({ date:"", task:"", type:"donation", donator:"", length:"", day:"", links:[""] });
    setAddRowOpen(null);
  };

  const inp = { background:"#060e06", border:"1px solid #2a4a2a", borderRadius:3, padding:"7px 10px", color:"#c8e6c8", fontFamily:S.barlow, fontSize:16, outline:"none", width:"100%" };
  const thBase = { padding:"10px 12px", textAlign:"left", fontFamily:S.bebas, fontSize:16, letterSpacing:2, cursor:"pointer", userSelect:"none", whiteSpace:"nowrap", borderBottom:"2px solid #2a7a5a", background:"#0a2018" };

  return (
    <div>
      {confirmModal}
      {isVideos ? (
        <div style={{ background:"#0a1a0a", border:"1px solid #1a3a1a", borderRadius:4, padding:"12px 16px", marginBottom:14, display:"flex", gap:12, alignItems:"center" }}>
          <span style={{ fontFamily:S.bebas, fontSize:16, letterSpacing:3, color:"#6a9e6a" }}>{"492 VIDEOS —"}</span>
          <span style={{ fontFamily:S.barlow, fontSize:15, color:"#f5a623", fontWeight:600 }}>■ Versus Event</span>
          <span style={{ fontFamily:S.barlow, fontSize:15, color:"#c8e6c8", fontWeight:600 }}>■ Let&#39;s Play / Video</span>
          <span style={{ fontFamily:S.barlow, fontSize:15, color:"#6a9e6a", marginLeft:"auto" }}>Click title to watch</span>
        </div>
      ) : (
      <div style={{ background:"#0a1a0a", border:"1px solid #1a3a1a", borderRadius:4, padding:"12px 16px", marginBottom:14 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
          <div style={{ fontFamily:S.bebas, fontSize:16, letterSpacing:3, color:"#6a9e6a" }}>{"COLOR KEY — CLICK TO FILTER"}</div>
          <div style={{ display:"flex", gap:8 }}>
            {hiddenTypes.length > 0 && (
              <button onClick={() => setHiddenTypes([])}
                style={{ fontFamily:S.bebas, fontSize:12, letterSpacing:2, color:"#facc15", background:"none", border:"1px solid #facc1544", borderRadius:3, padding:"3px 10px", cursor:"pointer" }}>
                SHOW ALL
              </button>
            )}
            {hiddenTypes.length < ROW_TYPES.length && (
              <button onClick={() => setHiddenTypes(ROW_TYPES.map(t => t.id))}
                style={{ fontFamily:S.bebas, fontSize:12, letterSpacing:2, color:"#6a9e6a", background:"none", border:"1px solid #2a4a2a", borderRadius:3, padding:"3px 10px", cursor:"pointer" }}>
                HIDE ALL
              </button>
            )}
          </div>
        </div>
        <div style={{ display:"flex", flexWrap:"wrap", gap:8, alignItems:"center" }}>
          {ROW_TYPES.map(t => {
            const isHidden = hiddenTypes.includes(t.id);
            return (
              <button key={t.id} onClick={() => toggleType(t.id)}
                style={{ padding:"5px 12px", borderRadius:3, background: isHidden ? "#0a0a0a" : t.bg, border:"1px solid " + (isHidden ? "#2a2a2a" : t.border), cursor:"pointer", transition:"all 0.2s", opacity: isHidden ? 0.35 : 1 }}>
                <span style={{ fontFamily:S.barlow, fontSize:15, color: isHidden ? "#444" : t.text, fontWeight:600, textDecoration: isHidden ? "line-through" : "none" }}>
                  {t.label}
                </span>
              </button>
            );
          })}
          {hiddenTypes.length > 0 && (
            <button onClick={() => setHiddenTypes([])}
              style={{ fontFamily:S.bebas, fontSize:12, letterSpacing:2, color:"#6a9e6a", background:"none", border:"1px solid #2a4a2a", borderRadius:3, padding:"3px 10px", cursor:"pointer", marginLeft:4 }}>
              {"✕ DESELECT ALL"}
            </button>
          )}
        </div>
        {(hiddenTypes.length > 0 || searchGame || searchDonator) && (
          <div style={{ fontFamily:S.barlow, fontSize:14, color:"#6a9e6a", marginTop:8, fontStyle:"italic" }}>
            {"Showing " + (sorted.filter(r => r.type !== "event_banner" && r.type !== "event_subheader").length) + " of " + getRaw(activeEvent).filter(r => r.type !== "event_banner" && r.type !== "event_subheader").length + " entries"}
          </div>
        )}
      </div>
      )}

      {!isStats && <div style={{ display:"flex", gap:10, marginBottom:12, flexWrap:"wrap" }}>
        <div style={{ flex:1, minWidth:200, position:"relative" }}>
          <input
            value={searchGame}
            onChange={e => setSearchGame(e.target.value)}
            placeholder="Search game / segment..."
            style={{ width:"100%", boxSizing:"border-box", background:"#060e06", border:"1px solid " + (searchGame ? "#3a8a6a" : "#1a3a1a"), borderRadius:3, padding:"8px 32px 8px 10px", color:"#c8e6c8", fontFamily:"Barlow, sans-serif", fontSize:16, outline:"none" }}
          />
          {searchGame && (
            <button onClick={() => setSearchGame("")}
              style={{ position:"absolute", right:8, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", color:"#6a9e6a", cursor:"pointer", fontSize:17, lineHeight:1 }}>✕</button>
          )}
        </div>
        <div style={{ flex:1, minWidth:200, position:"relative" }}>
          <input
            value={searchDonator}
            onChange={e => setSearchDonator(e.target.value)}
            placeholder="Search donator / sponsor / winner..."
            style={{ width:"100%", boxSizing:"border-box", background:"#060e06", border:"1px solid " + (searchDonator ? "#3a8a6a" : "#1a3a1a"), borderRadius:3, padding:"8px 32px 8px 10px", color:"#c8e6c8", fontFamily:"Barlow, sans-serif", fontSize:16, outline:"none" }}
          />
          {searchDonator && (
            <button onClick={() => setSearchDonator("")}
              style={{ position:"absolute", right:8, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", color:"#6a9e6a", cursor:"pointer", fontSize:17, lineHeight:1 }}>✕</button>
          )}
        </div>
      </div>}

      {/* Stats Panel */}
      {!isGiveaways && !isVideos && !isStats && (
        <div style={{ marginBottom:14 }}>
          <button onClick={() => setStatsOpen(o => !o)}
            style={{ fontFamily:S.bebas, fontSize:14, letterSpacing:3, padding:"8px 18px", borderRadius:3, border:"1px solid " + (statsOpen ? "#a78bfa88" : "#1a3a1a"), background: statsOpen ? "#1a0a2a" : "#0a1a0a", color: statsOpen ? "#a78bfa" : "#6a9e6a", cursor:"pointer", width:"100%" }}>
            {statsOpen ? "▲ HIDE STATS" : "▼ SHOW STATS & TOP DONATORS"}
          </button>
          {statsOpen && (
            <div style={{ background:"#0a1a0a", border:"1px solid #1a3a1a", borderTop:"none", borderRadius:"0 0 4px 4px", padding:"16px 18px" }}>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>

                {/* Type breakdown */}
                <div>
                  <div style={{ fontFamily:S.bebas, fontSize:14, letterSpacing:3, color:"#a78bfa", marginBottom:10 }}>ENTRIES BY TYPE</div>
                  <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
                    {ROW_TYPES.filter(t => typeCounts[t.id] > 0).map(t => {
                      const count = typeCounts[t.id];
                      const total = statsRows.length;
                      const pct = total > 0 ? (count / total) * 100 : 0;
                      return (
                        <div key={t.id}>
                          <div style={{ display:"flex", justifyContent:"space-between", marginBottom:3 }}>
                            <span style={{ fontFamily:S.barlow, fontSize:14, color:t.text }}>{t.label}</span>
                            <span style={{ fontFamily:S.bebas, fontSize:14, color:t.text, letterSpacing:1 }}>{count}</span>
                          </div>
                          <div style={{ height:5, background:"#0d0d0d", borderRadius:3, overflow:"hidden" }}>
                            <div style={{ height:"100%", width:pct+"%", background:t.border, borderRadius:3, transition:"width 0.5s" }} />
                          </div>
                        </div>
                      );
                    })}
                    <div style={{ marginTop:6, fontFamily:S.barlow, fontSize:13, color:"#4a6a4a", fontStyle:"italic" }}>
                      {statsRows.length} total entries
                    </div>
                  </div>
                </div>

                {/* Top donators */}
                <div>
                  <div style={{ fontFamily:S.bebas, fontSize:14, letterSpacing:3, color:"#a78bfa", marginBottom:10 }}>TOP DONATORS / SPONSORS</div>
                  {topDonators.length === 0 ? (
                    <div style={{ fontFamily:S.barlow, fontSize:13, color:"#2a4a2a", fontStyle:"italic" }}>No data yet.</div>

                    <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
                      {topDonators.map(([name, count], i) => {
                        const max = topDonators[0][1];

                        return (
                          <div key={name}>
                            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:3 }}>
                              <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                                <span style={{ fontFamily:S.bebas, fontSize:12, color:medalColor, minWidth:18 }}>#{i+1}</span>

                              </div>
                              <span style={{ fontFamily:S.bebas, fontSize:14, color:medalColor, letterSpacing:1 }}>{count}x</span>
                            </div>
                            <div style={{ height:4, background:"#0d0d0d", borderRadius:2, overflow:"hidden" }}>
                              <div style={{ height:"100%", width:pct+"%", background:medalColor, borderRadius:2, transition:"width 0.5s", opacity:0.7 }} />
                            </div>
                          </div>

                      })}
                    </div>
                  )}
                </div>

              </div>
            </div>
          )}
        </div>
      )}

      <div style={{ display:"flex", gap:8, marginBottom:14, flexWrap:"wrap" }}>
        {ALL_EVENTS.map(ev => (
          <button key={ev} onClick={() => { setHistSort(s => Object.assign({}, s, { event:ev })); setSearchGame(""); setSearchDonator(""); }}
            style={{ padding:"8px 18px", borderRadius:3, border:"1px solid " + (activeEvent===ev ? "#3a8a6a88" : "#1a2e1a"), background: activeEvent===ev ? "#0a2018" : "#0a1a0a", color: activeEvent===ev ? "#7adba0" : "#6a9e6a", fontFamily:S.bebas, fontSize:16, letterSpacing:2, cursor:"pointer" }}>
            {ev}
          </button>
        ))}
        <button onClick={() => { setHistSort(s => Object.assign({}, s, { event:"Stats" })); setSearchGame(""); setSearchDonator(""); }}
          style={{ padding:"8px 18px", borderRadius:3, border:"1px solid " + (activeEvent==="Stats" ? "#a78bfa88" : "#1a2e1a"), background: activeEvent==="Stats" ? "#12082a" : "#0a1a0a", color: activeEvent==="Stats" ? "#a78bfa" : "#6a9e6a", fontFamily:S.bebas, fontSize:16, letterSpacing:2, cursor:"pointer" }}>
          {"📊 STATS"}
        </button>
      </div>


      {historyLoading && (
        <div style={{ textAlign:"center", padding:"60px 0", fontFamily:"Barlow, sans-serif", color:"#6a9e6a", fontSize:16 }}>
          <div style={{ marginBottom:12 }}>Loading history from the vault...</div>
          <div style={{ width:120, height:3, background:"#1a3a1a", borderRadius:2, overflow:"hidden", margin:"0 auto" }}>
            <div style={{ height:"100%", background:"linear-gradient(90deg,#facc15,#a3d9a3)", borderRadius:2, animation:"shimmer 1.2s ease-in-out infinite" }} />
          </div>

      {!historyLoading && isStats && <StatsPanel historyRows={historyRows} />}
      {!historyLoading && !isStats && (<>

        <div style={{ overflowX:"auto" }}>
          <table style={{ width:"100%", borderCollapse:"collapse", minWidth:700 }}>
            <thead>
              <tr>
                {COLS.map(c => (

                    {c.label} {histSort.col===c.id ? (histSort.dir==="asc" ? " ^" : " v") : ""}
                  </th>

                {activeEvent !== "Versus Build-a-thon" && activeEvent !== "All" && activeEvent !== "Giveaways" && activeEvent !== "Videos" && <th style={Object.assign({}, thBase, { cursor:"default" })}></th>}

              {sorted.length === 0 && (
                <tr><td colSpan={7} style={{ padding:"28px", textAlign:"center", fontFamily:S.barlow, color:"#2a4a2a", fontSize:17, fontStyle:"italic" }}>
                  {activeEvent === "Versus Build-a-thon" ? "No completed requests yet." : activeEvent === "All" ? "No entries across any event yet." : "No entries yet. Add your first row below."}
                </td></tr>
              )}
              {sorted.map((row, ri) => {
                const rowKey = (row._event||activeEvent) + "_" + (row.id||ri);
                const t = getRowType(row.type);
                if (row.type === "event_banner") {
                  return (
                    <tr key={rowKey}>
                      <td colSpan={7} style={{ padding:"10px 16px", background:"#002a10", border:"1px solid #00aa4466", textAlign:"center" }}>
                        <span style={{ fontFamily:S.bebas, fontSize:19, color:"#22dd66", letterSpacing:3, textShadow:"0 0 10px #22dd6666" }}>{row.task}</span>
                      </td>
                    </tr>
                  );
                }
                if (row.type === "event_subheader") {
                  return (
                    <tr key={rowKey}>
                      <td colSpan={7} style={{ padding:"4px 16px 8px", background:"#002a10", border:"1px solid #00aa4422", textAlign:"center" }}>
                        <span style={{ fontFamily:S.barlow, fontSize:13, color:"#4ade8099", letterSpacing:2, fontStyle:"italic" }}>{row.task}</span>
                      </td>
                    </tr>
                  );
                }
                const tierInfo = row.tierName ? TIERS.find(tt => tt.name === row.tierName) : null;
                if (isVideos) {
                  const isVs = row.type === "versus";
                  return (
                    <tr key={rowKey} style={{ background: isVs ? "#2a1a00" : "#0a1a0a", borderBottom:"1px solid #1a3a1a" }}>
                      <td style={{ padding:"8px 12px", fontFamily:S.barlow, fontSize:16, color: isVs ? "#f5a623" : "#7ab8e8", whiteSpace:"nowrap" }}>{row.date}</td>
                      <td style={{ padding:"8px 12px", fontFamily:S.barlow, fontSize:16, color: isVs ? "#f5a623" : "#c8e6c8", fontWeight:600 }}>
                        <a href={(row.links||[])[0]} target="_blank" rel="noreferrer"
                          style={{ color: isVs ? "#f5a623" : "#7ab8e8", textDecoration:"none" }}

                          onMouseOut={e => e.target.style.textDecoration="none"}>
                          {row.task}
                        </a>
                      </td>
                      <td style={{ padding:"8px 12px", fontFamily:S.barlow, fontSize:16, color:"#6a9e6a", whiteSpace:"nowrap" }}>{row.length}</td>

                if (isGiveaways) {
                  return (
                    <tr key={rowKey} style={{ background:"#0a1a2e", borderBottom:"1px solid #2a5a8a33" }}>
                      <td style={{ padding:"10px 12px", fontFamily:S.barlow, fontSize:16, color:"#7ab8e8", whiteSpace:"nowrap" }}>{row.date||"—"}</td>
                      <td style={{ padding:"10px 12px", fontFamily:S.barlow, fontSize:17, color:"#c8e6c8", fontWeight:600 }}>{row.task}</td>
                      <td style={{ padding:"10px 12px", fontFamily:S.barlow, fontSize:16, color:"#a3d9a3" }}>{row.winners||"—"}</td>
                    </tr>
                  );
                }
                return (
                  <tr key={rowKey} style={{ background:t.bg, borderBottom:"1px solid " + t.border + "33", opacity: (row.fromRequest && !row.completed) ? 0.6 : 1 }}>
                    {activeEvent === "All" && (
                      <td style={{ padding:"8px 12px", fontFamily:S.bebas, fontSize:15, color:"#7adba0", whiteSpace:"nowrap", letterSpacing:1 }}>{row._event || "Versus Build-a-thon"}</td>

                      {row.fromRequest && !row.completed && (
                        <span style={{ marginLeft:8, fontSize:13, padding:"2px 6px", borderRadius:2, background:"#2a1a00", color:"#aa8844", fontFamily:S.bebas, letterSpacing:1 }}>UNCOMPLETED</span>

                          {row.links.filter(l => l).map((l, li) => {
                            const multi = row.links.filter(x=>x).length > 1;

                          })}
                        </div>
                      ) : <span style={{ color:"#2a4a2a", fontSize:15 }}>{"—"}</span>}
                    </td>
                    {isAdmin && activeEvent !== "Versus Build-a-thon" && activeEvent !== "All" && activeEvent !== "Giveaways" && activeEvent !== "Videos" && (
                      <td style={{ padding:"8px 8px" }}>
                        <button onClick={() => confirmDelete(
                            `Remove "${row.task}" from ${activeEvent}?`,
                            () => { pushUndo && pushUndo("Delete event row"); setHistoryRows(h => Object.assign({}, h, { [activeEvent]: (h[activeEvent]||[]).filter((_, i) => i !== ri) })); }
                          )}
                          style={{ background:"none", border:"none", color:"#4a2a2a", fontSize:17, cursor:"pointer" }}>✕</button>
                      </td>
                    )}
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {isAdmin && activeEvent !== "Versus Build-a-thon" && activeEvent !== "All" && activeEvent !== "Giveaways" && activeEvent !== "Videos" && (
        <div>
          {addRowOpen === activeEvent ? (
            <div style={{ background:"#0a1a0a", border:"1px solid #2a4a2a", borderRadius:4, padding:20 }}>
              <div style={{ fontFamily:S.bebas, fontSize:19, letterSpacing:2, color:"#7adba0", marginBottom:14 }}>{"ADD ROW — "}{activeEvent}</div>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))", gap:10, marginBottom:12 }}>
                {[{k:"date",l:"DATE",t:"date"},{k:"task",l:"GAME/EVENT",t:"text"},{k:"donator",l:"DONATOR",t:"text"},{k:"length",l:"LENGTH PLAYED",t:"text"},{k:"day",l:"DAY",t:"text"}].map(f => (
                  <div key={f.k}>
                    <label style={{ fontFamily:S.barlow, fontSize:13, letterSpacing:2, color:"#6a9e6a", display:"block", marginBottom:4 }}>{f.l}</label>
                    <input type={f.t} value={newRow[f.k]} onChange={e => setNewRow(r => Object.assign({}, r, { [f.k]: e.target.value }))} style={Object.assign({}, inp, { colorScheme:"dark" })} />
                  </div>
                ))}
                <div>
                  <label style={{ fontFamily:S.barlow, fontSize:13, letterSpacing:2, color:"#6a9e6a", display:"block", marginBottom:4 }}>ROW TYPE</label>
                  <select value={newRow.type} onChange={e => setNewRow(r => Object.assign({}, r, { type: e.target.value }))} style={Object.assign({}, inp, { colorScheme:"dark" })}>
                    {ROW_TYPES.map(t => <option key={t.id} value={t.id}>{t.label}</option>)}
                  </select>
                </div>
              </div>
              <div style={{ marginBottom:12 }}>
                <label style={{ fontFamily:S.barlow, fontSize:13, letterSpacing:2, color:"#6a9e6a", display:"block", marginBottom:4 }}>YOUTUBE LINKS</label>
                {newRow.links.map((l, li) => (
                  <div key={li} style={{ display:"flex", gap:8, marginBottom:6 }}>
                    <input value={l} onChange={e => setNewRow(r => Object.assign({}, r, { links: r.links.map((x, i) => i === li ? e.target.value : x) }))} placeholder={"Part " + (li+1) + " URL"} style={inp} />
                    {newRow.links.length > 1 && (
                      <button onClick={() => setNewRow(r => Object.assign({}, r, { links: r.links.filter((_, i) => i !== li) }))}
                        style={{ background:"none", border:"1px solid #3a2a2a", borderRadius:3, color:"#804040", cursor:"pointer", padding:"0 10px" }}>X</button>
                    )}
                  </div>
                ))}
                <button onClick={() => setNewRow(r => Object.assign({}, r, { links: [...r.links, ""] }))}
                  style={{ background:"none", border:"1px solid #2a4a2a", borderRadius:3, color:"#6a9e6a", cursor:"pointer", padding:"5px 14px", fontFamily:S.barlow, fontSize:15 }}>+ Add Link</button>
              </div>
              <div style={{ display:"flex", gap:10 }}>
                <button onClick={() => setAddRowOpen(null)} style={{ flex:1, padding:"9px 0", borderRadius:3, border:"1px solid #1a3a1a", background:"none", color:"#6a9e6a", fontFamily:S.bebas, fontSize:17, letterSpacing:2, cursor:"pointer" }}>CANCEL</button>
                <button onClick={submitRow} style={{ flex:2, padding:"9px 0", borderRadius:3, border:"1px solid #3a8a5a88", background:"#0a2018", color:"#7adba0", fontFamily:S.bebas, fontSize:17, letterSpacing:2, cursor:"pointer" }}>ADD ROW</button>
              </div>
            </div>
          ) : (
            <button onClick={() => setAddRowOpen(activeEvent)}
              style={{ width:"100%", padding:"11px 0", borderRadius:3, border:"1px solid #2a5a3a", background:"#0a1a0a", color:"#7adba0", fontFamily:S.bebas, fontSize:18, letterSpacing:3, cursor:"pointer" }}>
              ADD ROW TO {activeEvent.toUpperCase()}
            </button>
          )}
        </div>
      )}

      {activeEvent === "Versus Build-a-thon" && requests.filter(r => r.tierName !== "WHEEL").length > 0 && (
        <QuestCompletionStatus requests={requests} setRequests={setRequests} isAdmin={isAdmin} pushUndo={pushUndo} />
      )}
      </>)}
    </div>
  );
}
